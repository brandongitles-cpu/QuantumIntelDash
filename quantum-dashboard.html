            <div>
              {portfolioCos.map(c => {
                const mc = MARKET_CAPS[c.id] || {};
                const tc = QUANTUM_TYPE_COLORS[c.quantumType] || QUANTUM_TYPE_COLORS.hardware;
                const t = storedTiers[c.id];
                const tierCfg = TIER_CONFIG_RB[t];
                const statusLabel = { public:'Public', ipo_expected:'IPO Target', spac:'SPAC', private_funded:'Private', acquired:'Acquired' }[mc.capStatus] || 'Private';
                return (
                  <div key={c.id} className="fund-company-row">
                    <span className="qt-badge" style={{ background:tc.bg, color:tc.color }}>{tc.label}</span>
                    <span style={{ fontSize:13, fontWeight:700, color:'#f1f5f9', flex:1 }}>{c.name}</span>
                    {c.ticker && c.ticker !== 'Private' && c.ticker !== 'Pre-IPO' &&
                      <span style={{ fontSize:10, color:'var(--dim)' }}>{c.ticker}</span>}
                    <span style={{ fontSize:9, padding:'2px 7px', borderRadius:3, background:'rgba(255,255,255,0.05)', color:'#94a3b8', fontWeight:700 }}>{statusLabel}</span>
                    {tierCfg && <span style={{ fontSize:9, padding:'2px 7px', borderRadius:3, background:`rgba(${tierCfg.rgb},0.12)`, color:tierCfg.color, fontWeight:700 }}>{tierCfg.label} {tierCfg.pct}%</span>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Section E: Investment Strategy */}
      <div className="fund-section">
        <div className="fund-section-title">Investment Strategy</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:16 }}>
          <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:8, padding:20 }}>
            <div style={{ fontSize:12, fontWeight:800, color:'#f1f5f9', marginBottom:10 }}>Selection Framework</div>
            <div style={{ fontSize:12, color:'#94a3b8', lineHeight:1.8 }}>
              {['Physics execution & QEC ratio', 'Moat strength & defensibility', 'Commercialization clarity', 'Valuation vs. quantum premium', 'Management track record', 'Timing on the LRAC cost curve', 'Portfolio construction balance'].map((d, i) => (
                <div key={i} style={{ display:'flex', gap:8, marginBottom:2 }}>
                  <span style={{ color:'var(--dim)', flexShrink:0 }}>{i+1}.</span>
                  <span>{d}</span>
                </div>
              ))}
            </div>
          </div>
          <div style={{ background:'var(--card)', border:'1px solid var(--border)', borderRadius:8, padding:20 }}>
            <div style={{ fontSize:12, fontWeight:800, color:'#f1f5f9', marginBottom:10 }}>Position Sizing</div>
            {Object.entries(TIER_CONFIG_RB).map(([key, t]) => (
              <div key={key} style={{ display:'flex', alignItems:'center', gap:10, marginBottom:10 }}>
                <span style={{ fontSize:11, fontWeight:700, padding:'3px 10px', borderRadius:3, background:`rgba(${t.rgb},0.12)`, color:t.color, minWidth:70, textAlign:'center' }}>{t.label}</span>
                <div>
                  <div style={{ fontSize:12, fontWeight:700, color:'#f1f5f9' }}>{t.range}</div>
                  <div style={{ fontSize:10, color:'#64748b' }}>
                    {key === 'anchor' && 'Demonstrated leaders with proven moat'}
                    {key === 'booster' && 'Proving-phase companies with clear path'}
                    {key === 'taster' && 'High-conviction early stage, binary upside'}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Section F: Risk Factors */}
      <div className="fund-section">
        <div className="fund-section-title">Risk Factors</div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }}>
          {[
            { title:'Timeline Risk', body:'Fault-tolerant quantum computing may be 5-10 years from utility scale. Near-term catalysts are milestones, not revenue guarantees.' },
            { title:'Modality Risk', body:'The winning hardware architecture is not yet determined. Trapped ion, neutral atom, superconducting, and photonic all have viable paths.' },
            { title:'Valuation Risk', body:'Quantum premiums can compress rapidly. SPAC post-close performance illustrates the downside. Patience and conviction sizing are required.' },
            { title:'Liquidity Risk', body:'Private positions are illiquid on 3-7 year horizons. SPAC and pre-IPO positions have lock-up periods and limited secondary markets.' },
            { title:'Concentration Risk', body:'Sector-specific fund with no hedge against a quantum winter or paradigm-level setback. This is a concentrated thesis investment.' },
          ].map(r => (
            <div key={r.title} className="fund-risk-card">
              <div className="fund-risk-title">{r.title}</div>
              <div className="fund-risk-body">{r.body}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Section G: Footer */}
      <div className="fund-footer">
        <div style={{ fontSize:13, fontWeight:700, color:'#f1f5f9', marginBottom:8 }}>Investment Inquiries</div>
        <div style={{ fontSize:12, color:'#64748b', marginBottom:16 }}>[contact placeholder]</div>
        <div style={{ fontSize:10, color:'#2d3748', maxWidth:600, margin:'0 auto', lineHeight:1.7 }}>
          For qualified investors only. Not investment advice. This document is for informational purposes and does not constitute an offer to sell or a solicitation of an offer to buy any securities. Past performance does not predict future results. All investments involve risk including possible loss of principal.
        </div>
      </div>
    </div>
  );
}

/* ─── ALL COMPANIES TAB ─────────────────────────────────── */

function AllCompaniesTab() {
  const [search, setSearch] = React.useState('');
  const [catFilter, setCatFilter] = React.useState('All');
  const [statusFilter, setStatusFilter] = React.useState('All');

  const CATS = ['All','Hardware','Software','Security','Infrastructure','Applications','Consulting'];
  const CAT_COLOR = {Hardware:'#3b82f6',Software:'#8b5cf6',Security:'#ef4444',Infrastructure:'#f97316',Applications:'#10b981',Consulting:'#f59e0b'};

  const filtered = React.useMemo(() => {
    const q = search.toLowerCase();
    return ALL_QUANTUM_COMPANIES.filter(c => {
      const matchQ = !q || c.name.toLowerCase().includes(q) || c.desc.toLowerCase().includes(q) || c.tech.toLowerCase().includes(q) || (c.country||'').toLowerCase().includes(q);
      const matchCat = catFilter === 'All' || c.category === catFilter;
      const matchStatus = statusFilter === 'All'
        || (statusFilter === 'Tracked' && c.tracked)
        || (statusFilter === 'Changes' && c.status);
      return matchQ && matchCat && matchStatus;
    });
  }, [search, catFilter, statusFilter]);

  const counts = React.useMemo(() => {
    const m = {};
    ALL_QUANTUM_COMPANIES.forEach(c => { m[c.category] = (m[c.category]||0)+1; });
    return m;
  }, []);

  const trackedTotal = ALL_QUANTUM_COMPANIES.filter(c=>c.tracked).length;
  const changesTotal = ALL_QUANTUM_COMPANIES.filter(c=>c.status).length;

  const StatusBadge = ({c}) => {
    if (c.tracked) return <span className="tag" style={{background:'rgba(16,185,129,0.15)',color:'#34d399',fontSize:8,padding:'1px 5px'}}>TRACKED</span>;
    if (c.status==='acquired') return <span className="tag" style={{background:'rgba(239,68,68,0.12)',color:'#f87171',fontSize:8,padding:'1px 5px'}}>ACQUIRED</span>;
    if (c.status==='merged') return <span className="tag" style={{background:'rgba(245,158,11,0.12)',color:'#fbbf24',fontSize:8,padding:'1px 5px'}}>MERGED</span>;
    if (c.status==='renamed') return <span className="tag" style={{background:'rgba(245,158,11,0.12)',color:'#fbbf24',fontSize:8,padding:'1px 5px'}}>RENAMED</span>;
    if (c.status==='defunct') return <span className="tag" style={{background:'rgba(100,116,139,0.12)',color:'#94a3b8',fontSize:8,padding:'1px 5px'}}>DEFUNCT</span>;
    return null;
  };

  return (
    <div>
      {/* Summary counts */}
      <div style={{display:'flex',gap:8,marginBottom:16,flexWrap:'wrap'}}>
        {CATS.filter(c=>c!=='All').map(cat=>(
          <div key={cat} onClick={()=>setCatFilter(prev=>prev===cat?'All':cat)}
            style={{background:'var(--card)',border:`1px solid ${catFilter===cat?CAT_COLOR[cat]:'var(--border)'}`,borderRadius:7,padding:'7px 13px',cursor:'pointer',transition:'all 0.15s'}}>
            <div style={{fontSize:8,fontWeight:700,letterSpacing:0.6,color:CAT_COLOR[cat],textTransform:'uppercase',marginBottom:2}}>{cat}</div>
            <div style={{fontSize:18,fontWeight:800,color:'#f1f5f9'}}>{counts[cat]||0}</div>
          </div>
        ))}
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:7,padding:'7px 13px'}}>
          <div style={{fontSize:8,fontWeight:700,letterSpacing:0.6,color:'#34d399',textTransform:'uppercase',marginBottom:2}}>TRACKED</div>
          <div style={{fontSize:18,fontWeight:800,color:'#f1f5f9'}}>{trackedTotal}</div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:7,padding:'7px 13px'}}>
          <div style={{fontSize:8,fontWeight:700,letterSpacing:0.6,color:'#f59e0b',textTransform:'uppercase',marginBottom:2}}>CHANGES</div>
          <div style={{fontSize:18,fontWeight:800,color:'#f1f5f9'}}>{changesTotal}</div>
        </div>
        <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:7,padding:'7px 13px'}}>
          <div style={{fontSize:8,fontWeight:700,letterSpacing:0.6,color:'var(--dim)',textTransform:'uppercase',marginBottom:2}}>TOTAL</div>
          <div style={{fontSize:18,fontWeight:800,color:'#f1f5f9'}}>{ALL_QUANTUM_COMPANIES.length}</div>
        </div>
      </div>

      {/* Filter bar */}
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
        <input type="text" placeholder="Search name, tech, country..."
          value={search} onChange={e=>setSearch(e.target.value)}
          style={{background:'rgba(255,255,255,0.04)',border:'1px solid var(--border)',borderRadius:5,color:'#e2e8f0',fontSize:11,padding:'5px 11px',fontFamily:'inherit',width:230,outline:'none'}}
        />
        <div style={{display:'flex',gap:3}}>
          {['All','Tracked','Changes'].map(s=>(
            <button key={s} className={`invest-filter-btn ${statusFilter===s?'active':''}`} onClick={()=>setStatusFilter(s)}>{s}</button>
          ))}
        </div>
        <span style={{fontSize:10,color:'var(--dim)',marginLeft:4}}>{filtered.length} of {ALL_QUANTUM_COMPANIES.length} companies</span>
      </div>

      {/* Table */}
      <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:10,overflow:'auto',maxHeight:'72vh'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
          <thead style={{position:'sticky',top:0,background:'var(--card)',zIndex:1}}>
            <tr style={{borderBottom:'1px solid var(--border)'}}>
              {['Company','Category','Tech Focus','Description','Country','Status'].map(h=>(
                <th key={h} style={{textAlign:'left',padding:'8px 12px',fontSize:9,fontWeight:700,letterSpacing:0.6,color:'var(--dim)',textTransform:'uppercase',whiteSpace:'nowrap',borderRight:'1px solid rgba(255,255,255,0.03)'}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((c,i)=>(
              <tr key={c.name} style={{borderBottom:'1px solid rgba(255,255,255,0.025)',background:i%2===0?'transparent':'rgba(255,255,255,0.008)'}}>
                <td style={{padding:'7px 12px',fontWeight:700,color:'#f1f5f9',whiteSpace:'nowrap',borderRight:'1px solid rgba(255,255,255,0.03)'}}>{c.name}</td>
                <td style={{padding:'7px 12px',whiteSpace:'nowrap',borderRight:'1px solid rgba(255,255,255,0.03)'}}>
                  <span style={{fontSize:9,fontWeight:700,padding:'2px 6px',borderRadius:3,background:`${CAT_COLOR[c.category]}18`,color:CAT_COLOR[c.category]}}>{c.category}</span>
                </td>
                <td style={{padding:'7px 12px',color:'#94a3b8',whiteSpace:'nowrap',fontSize:10,borderRight:'1px solid rgba(255,255,255,0.03)'}}>{c.tech}</td>
                <td style={{padding:'7px 12px',color:'#64748b',maxWidth:400,lineHeight:1.5,borderRight:'1px solid rgba(255,255,255,0.03)'}}>
                  {c.desc}
                  {c.statusNote && <span style={{color:'#f59e0b',marginLeft:6,fontSize:10}}>[{c.statusNote}]</span>}
                </td>
                <td style={{padding:'7px 12px',color:'#475569',whiteSpace:'nowrap',fontSize:10,borderRight:'1px solid rgba(255,255,255,0.03)'}}>{c.country||'—'}</td>
                <td style={{padding:'7px 12px',whiteSpace:'nowrap'}}><StatusBadge c={c}/></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{marginTop:10,fontSize:9,color:'#2d3748',lineHeight:1.8}}>
        TRACKED = full analysis in Scatter/Investability views · ACQUIRED/MERGED/RENAMED = notable corporate change · Sources: industry directories + Wikipedia · {ALL_QUANTUM_COMPANIES.length} companies · Apr 2026
      </div>
    </div>
  );
}

/* ─── APP ──────────────────────────────────────────────── */

function App() {
  const [tab, setTab] = React.useState('scatter');
  const [openMenu, setOpenMenu] = React.useState(null);
  const [selected, setSelected] = React.useState(null);

  const INVEST_TABS = [
    ['invest','Investability'],['valuation','Market Map'],['rebalancer','Portfolio'],
    ['fund','Fund Overview'],['qtum','QTUM ETF'],
  ];
  const RESEARCH_TABS = [
    ['scatter','Scatter View'],['grid','Phase Grid'],['allcos','All Companies'],
    ['comparator','Modality Comparator'],['modality','Modality Explanation'],
    ['lrac','Scale Economics'],['glossary','Glossary'],['changelog','Changelog'],
  ];

  React.useEffect(() => {
    if (!openMenu) return;
    const close = () => setOpenMenu(null);
    document.addEventListener('click', close, {once: true});
    return () => document.removeEventListener('click', close);
  }, [openMenu]);
  const handleSelect = (c) => setSelected(prev => prev?.id === c.id ? null : c);

  const [portfolioStatuses, setPortfolioStatuses] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('qi-portfolio-statuses') || '{}'); } catch(e) { return {}; }
  });
  React.useEffect(() => {
    localStorage.setItem('qi-portfolio-statuses', JSON.stringify(portfolioStatuses));
  }, [portfolioStatuses]);
  const handleStatusChange = (id, status) => setPortfolioStatuses(prev => ({ ...prev, [id]: status || null }));

  const phaseOrder = ['engineering', 'commercial', 'proving'];
  const byPhase = phaseOrder.map(p => ({ phase: p, companies: COMPANIES.filter(c => c.phase === p && !c.contextTier) }));
  const contextCompanies = COMPANIES.filter(c => c.contextTier);

  return (
    <div className="wrap">
      <div className="header">
        <div className="header-left">
          <h1>Quantum Commercialization Intelligence</h1>
          <p>The only question: does this company commercialize? If yes, what's the moat? &nbsp;·&nbsp; Cost per logical qubit is the bridge metric.</p>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 8 }}>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
            {[
              { label: '★ DEMONSTRATED', cls: 'conf-demonstrated' },
              { label: '◉ TARGET', cls: 'conf-target' },
              { label: '○ ESTIMATED', cls: 'conf-estimated' },
              { label: '○ THEORETICAL', cls: 'conf-theoretical' },
            ].map(l => <span key={l.label} className={`tag ${l.cls}`}>{l.label}</span>)}
          </div>
          <span style={{ fontSize: 10, color: '#2d3748' }}>{VERSION} · Updated {LAST_UPDATED}</span>
        </div>
      </div>

      <div className="nav-wrap">
        {[['invest','Investment',INVEST_TABS],['research','Computing Research',RESEARCH_TABS]].map(([groupId,groupLabel,groupTabs]) => {
          const activeLabel = groupTabs.find(([tid]) => tid === tab)?.[1];
          return (
            <div key={groupId} className="nav-group" onClick={e => e.stopPropagation()}>
              <button
                className={`nav-btn ${activeLabel ? 'nav-active' : ''}`}
                onClick={() => setOpenMenu(prev => prev === groupId ? null : groupId)}
              >
                <span className="nav-btn-group">{groupLabel}</span>
                <span className="nav-sep">·</span>
                <span className="nav-btn-cur">{activeLabel || groupTabs[0][1]}</span>
                <span className="nav-btn-caret">{openMenu === groupId ? '▲' : '▼'}</span>
              </button>
              {openMenu === groupId && (
                <div className="nav-dropdown">
                  {groupTabs.map(([tid,tlabel]) => (
                    <button key={tid}
                      className={`nav-item ${tab === tid ? 'nav-item-active' : ''}`}
                      onClick={() => { setTab(tid); setOpenMenu(null); }}
                    >{tlabel}</button>
                  ))}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* SCATTER */}
      {tab === 'scatter' && (
        <>
          <div className="scatter-wrap">
            <div className="scatter-header">
              <div>
                <div className="scatter-title">Physics Phase vs. Logical Efficiency</div>
                <div className="scatter-sub">X: Lab → Market&nbsp;&nbsp;·&nbsp;&nbsp;Y: Physical-to-logical qubit ratio (log scale, lower = better)&nbsp;&nbsp;·&nbsp;&nbsp;Color: Scaling path</div>
              </div>
              <div className="legend">
                {Object.entries(SCALING_COLORS).map(([k, v]) => (
                  <div className="legend-item" key={k}>
                    <div className="legend-dot" style={{ background: v }} />
                    {({ semiconductor:'Semiconductor', modular_ion:'Ion Modular', optics:'Optics', cmos:'CMOS Foundry', annealing:'Annealing', outsourced:'Outsourced', novel:'Novel', infrastructure:'Infrastructure' })[k]}
                  </div>
                ))}
              </div>
            </div>
            <ScatterPlot companies={COMPANIES} selected={selected} onSelect={handleSelect} />
            <div style={{ display: 'flex', gap: 16, marginTop: 12, flexWrap: 'wrap' }}>
              <div style={{ fontSize: 10, color: '#475569' }}>★ = Demonstrated ratio&nbsp;&nbsp;·&nbsp;&nbsp;Filled circle = Demonstrated/Target&nbsp;&nbsp;·&nbsp;&nbsp;Ring = Estimated/Theoretical</div>
              <div style={{ fontSize: 10, color: '#10b981' }}>Green zone = Engineering Execution (physics solved)</div>
              <div style={{ fontSize: 10, color: '#f59e0b' }}>Amber zone = Physics Proving</div>
              <div style={{ fontSize: 10, color: '#3b82f6' }}>Blue zone = Commercial Revenue</div>
            </div>
          </div>
          {selected && <DetailPanel c={selected} onClose={() => setSelected(null)} />}
        </>
      )}

      {/* GRID */}
      {tab === 'grid' && (
        <>
          {byPhase.map(({ phase, companies }) => {
            const cfg = PHASE_CONFIG[phase];
            return (
              <div className="phase-section" key={phase}>
                <div className="phase-header" style={{ background: cfg.bg, border: `1px solid ${cfg.borderColor}` }}>
                  <span className="phase-label" style={{ color: cfg.color }}>{cfg.label}</span>
                  <span className="phase-sub" style={{ color: cfg.color }}>{cfg.sub}</span>
                  <span className="phase-count" style={{ background: cfg.borderColor, color: cfg.color, marginLeft: 'auto' }}>{companies.length}</span>
                </div>
                <div className="cards">
                  {companies.map(c => <CompanyCard key={c.id} c={c} selected={selected?.id === c.id} onSelect={handleSelect} portfolioStatus={portfolioStatuses[c.id]} onStatusChange={handleStatusChange} />)}
                </div>
              </div>
            );
          })}

          {/* Context tier */}
          <div className="phase-section">
            <div className="phase-header" style={{ background: 'rgba(100,116,139,0.06)', border: '1px solid rgba(100,116,139,0.15)' }}>
              <span className="phase-label" style={{ color: '#94a3b8' }}>Context Tier</span>
              <span className="phase-sub" style={{ color: '#64748b' }}>Big Tech / R&D — not ranked against pure-plays</span>
            </div>
            <div className="cards">
              {contextCompanies.map(c => <CompanyCard key={c.id} c={c} selected={selected?.id === c.id} onSelect={handleSelect} portfolioStatus={portfolioStatuses[c.id]} onStatusChange={handleStatusChange} />)}
            </div>
          </div>

          {selected && <DetailPanel c={selected} onClose={() => setSelected(null)} />}
        </>
      )}

      {/* MODALITY */}
      {tab === 'modality' && <ModalityRef />}

      {/* INVESTABILITY */}
      {tab === 'invest' && <InvestabilityTab companies={COMPANIES} />}

      {/* MODALITY COMPARATOR */}
      {tab === 'comparator' && <ModalityComparator />}

      {/* SCALE ECONOMICS — LRAC */}
      {tab === 'lrac' && <LRACChart />}

      {/* GLOSSARY */}
      {tab === 'glossary' && <GlossaryTab />}

      {/* CHANGELOG */}
      {tab === 'changelog' && <ChangelogTab />}

      {/* QTUM ETF ANALYSIS */}
      {tab === 'qtum' && <QTUMTab />}

      {/* ALL COMPANIES */}
      {tab === 'allcos' && <AllCompaniesTab />}

      {/* MARKET MAP */}
      {tab === 'valuation' && <ValuationTab portfolioStatuses={portfolioStatuses} />}

      {/* PORTFOLIO REBALANCER */}
      {tab === 'rebalancer' && <RebalancerTab portfolioStatuses={portfolioStatuses} onStatusChange={handleStatusChange} />}

      {/* FUND OVERVIEW */}
      {tab === 'fund' && <FundPitchTab portfolioStatuses={portfolioStatuses} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
