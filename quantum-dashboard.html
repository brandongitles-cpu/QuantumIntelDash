function LRACChart() {
  const W = 900, H = 480;
  const ml = 68, mr = 42, mt = 28, mb = 62;
  const pw = W - ml - mr, ph = H - mt - mb;

  const xMinL = Math.log10(0.6), xMaxL = Math.log10(2000000);
  const yMinL = Math.log10(0.3), yMaxL = Math.log10(35000);

  const toX = lq => ml + ((Math.log10(Math.max(lq, 0.5)) - xMinL) / (xMaxL - xMinL)) * pw;
  const toY = ci => mt + ((yMaxL - Math.log10(Math.max(ci, 0.3))) / (yMaxL - yMinL)) * ph;

  const interpY = (pts, x) => {
    const lx = Math.log10(x);
    for (let i = 0; i < pts.length - 1; i++) {
      const lx0 = Math.log10(pts[i][0]), lx1 = Math.log10(pts[i+1][0]);
      if (lx >= lx0 && lx <= lx1) {
        const t = (lx - lx0) / (lx1 - lx0);
        return Math.pow(10, Math.log10(pts[i][1]) + t * (Math.log10(pts[i+1][1]) - Math.log10(pts[i][1])));
      }
    }
    return null;
  };

  const ptsToPath = pts => pts.length < 2 ? '' :
    'M ' + pts.map(([x,y]) => `${toX(x).toFixed(1)},${toY(y).toFixed(1)}`).join(' L ');

  // LRAC envelope — minimum across non-theoretical curves at each scale
  const lracPts = React.useMemo(() => {
    const real = LRAC_CURVES.filter(c => !c.theoretical);
    const out = [];
    for (let i = 0; i <= 400; i++) {
      const lx = xMinL + (i / 400) * (xMaxL - xMinL);
      const x = Math.pow(10, lx);
      let minY = null;
      real.forEach(c => {
        const all = [...c.demonstrated, ...c.projected];
        if (!all.length) return;
        const y = interpY(all, x);
        if (y !== null && (minY === null || y < minY)) minY = y;
      });
      if (minY !== null) out.push([x, minY]);
    }
    return out;
  }, []);

  const [hidden, setHidden] = React.useState({});
  const [showEnv, setShowEnv] = React.useState(true);

  const xTicks = [[1,'1'],[10,'10'],[100,'100'],[1000,'1K'],[10000,'10K'],[100000,'100K'],[1000000,'1M']];
  const yTicks = [[1,'1'],[5,'5'],[10,'10'],[50,'50'],[100,'100'],[500,'500'],[1000,'1K'],[5000,'5K'],[10000,'10K']];
  const utilityY = 10;
  const classSimX = 90;

  return (
    <div>
      <div style={{ fontSize: 11, color: '#94a3b8', lineHeight: 1.7, marginBottom: 16, maxWidth: 900 }}>
        <strong style={{ color: '#e2e8f0' }}>Long-Run Average Cost (LRAC) Curve.</strong> In microeconomics, the LRAC envelope traces the minimum achievable average cost at each scale of production — the outer bound of all short-run curves. Applied to quantum: each modality has a distinct cost structure and trajectory. The <strong style={{ color: '#ffffff' }}>white envelope</strong> shows the cheapest available modality at any given scale (logical qubits). Solid lines = demonstrated. Dashed = roadmap projected. Dotted = theoretical. The strategic question: which trajectory reaches utility-scale economics first, and does any modality hit a structural <em>floor</em> before getting there?
      </div>

      {/* Legend */}
      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 14, marginBottom: 14, alignItems: 'center' }}>
        {LRAC_CURVES.map(c => (
          <div key={c.id} onClick={() => setHidden(h => ({ ...h, [c.id]: !h[c.id] }))}
            style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', opacity: hidden[c.id] ? 0.25 : 1, transition: 'opacity 0.15s' }}>
            <svg width={28} height={10}>
              <line x1={0} y1={5} x2={28} y2={5} stroke={c.color}
                strokeWidth={c.dim ? 1.5 : 2.5}
                strokeDasharray={c.theoretical ? '3 4' : (c.dim ? '6 3' : '0')}
                opacity={c.dim ? 0.6 : (c.theoretical ? 0.5 : 1)} />
            </svg>
            <span style={{ fontSize: 10, color: c.dim || c.theoretical ? '#64748b' : '#94a3b8' }}>{c.label}</span>
            {c.theoretical && <span style={{ fontSize: 8, color: '#475569' }}>◇ theoretical</span>}
          </div>
        ))}
        <div onClick={() => setShowEnv(s => !s)}
          style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', opacity: showEnv ? 1 : 0.3, transition: 'opacity 0.15s', marginLeft: 8 }}>
          <svg width={28} height={10}><line x1={0} y1={5} x2={28} y2={5} stroke="#fff" strokeWidth={2.5} opacity={0.8} /></svg>
          <span style={{ fontSize: 10, color: '#e2e8f0', fontWeight: 700 }}>LRAC Envelope</span>
        </div>
      </div>

      <div style={{ background: 'var(--card)', border: '1px solid var(--border)', borderRadius: 10, padding: '20px 16px 14px' }}>
        <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible' }}>

          {/* Classical simulation zone */}
          <rect x={ml} y={mt} width={toX(classSimX)-ml} height={ph} fill="rgba(239,68,68,0.04)" />
          <line x1={toX(classSimX)} y1={mt} x2={toX(classSimX)} y2={mt+ph}
            stroke="rgba(239,68,68,0.2)" strokeWidth={1} strokeDasharray="4 3" />
          <text x={toX(classSimX)-5} y={mt+10} textAnchor="end" fontSize={7.5}
            fill="rgba(239,68,68,0.45)" fontFamily="SF Mono,monospace">classical sim viable ←</text>

          {/* Grid */}
          {yTicks.map(([y]) => (
            <line key={y} x1={ml} x2={ml+pw} y1={toY(y)} y2={toY(y)}
              stroke="rgba(255,255,255,0.035)" strokeWidth={1} />
          ))}
          {xTicks.map(([x]) => (
            <line key={x} x1={toX(x)} x2={toX(x)} y1={mt} y2={mt+ph}
              stroke="rgba(255,255,255,0.035)" strokeWidth={1} />
          ))}

          {/* Utility threshold */}
          <line x1={ml} x2={ml+pw} y1={toY(utilityY)} y2={toY(utilityY)}
            stroke="#10b981" strokeWidth={1} strokeDasharray="8 4" opacity={0.45} />
          <text x={ml+pw+4} y={toY(utilityY)+4} fontSize={8} fill="#10b981"
            fontFamily="SF Mono,monospace">Utility threshold</text>

          {/* Cryo floor band for SC */}
          <rect x={toX(400)} y={toY(52)} width={ml+pw-toX(400)} height={toY(47)-toY(52)}
            fill="rgba(139,92,246,0.06)" />
          <text x={toX(500)} y={toY(50)-4} fontSize={7.5} fill="rgba(139,92,246,0.5)"
            fontFamily="SF Mono,monospace">cryo floor</text>

          {/* Y axis */}
          {yTicks.map(([y, lbl]) => (
            <g key={y}>
              <line x1={ml-4} x2={ml} y1={toY(y)} y2={toY(y)} stroke="#2d3748" strokeWidth={1} />
              <text x={ml-8} y={toY(y)+4} textAnchor="end" fontSize={8.5} fill="#475569"
                fontFamily="SF Mono,monospace">{lbl}</text>
            </g>
          ))}

          {/* X axis */}
          {xTicks.map(([x, lbl]) => (
            <g key={x}>
              <line x1={toX(x)} x2={toX(x)} y1={mt+ph} y2={mt+ph+4} stroke="#2d3748" strokeWidth={1} />
              <text x={toX(x)} y={mt+ph+16} textAnchor="middle" fontSize={9} fill="#475569"
                fontFamily="SF Mono,monospace">{lbl}</text>
            </g>
          ))}

          {/* Axis labels */}
          <text x={ml+pw/2} y={H-6} textAnchor="middle" fontSize={10} fill="#64748b"
            fontFamily="SF Mono,monospace">Logical Qubit Scale</text>
          <text textAnchor="middle" fontSize={10} fill="#64748b" fontFamily="SF Mono,monospace"
            transform={`translate(14,${mt+ph/2}) rotate(-90)`}>Cost per Useful Op (indexed, log)</text>

          {/* Curve lines */}
          {LRAC_CURVES.map(c => {
            if (hidden[c.id]) return null;
            const dem = c.demonstrated, proj = c.projected;
            const handoff = dem.length ? dem[dem.length - 1] : null;
            const projFull = handoff ? [handoff, ...proj] : proj;
            const sw = c.dim ? 1.5 : 2.5;
            const op = c.dim ? 0.45 : (c.theoretical ? 0.45 : 0.88);
            return (
              <g key={c.id}>
                {dem.length >= 2 && (
                  <path d={ptsToPath(dem)} fill="none" stroke={c.color} strokeWidth={sw} opacity={op} />
                )}
                {proj.length >= 2 && (
                  <path d={ptsToPath(projFull)} fill="none" stroke={c.color} strokeWidth={c.dim ? 1 : sw-0.5}
                    strokeDasharray={c.theoretical ? '3 5' : (c.dim ? '5 4' : '9 5')}
                    opacity={c.theoretical ? 0.38 : (c.dim ? 0.38 : 0.6)} />
                )}
                {/* Cost floor line */}
                {c.floor && !c.theoretical && proj.length && (() => {
                  const lastX = proj[proj.length-1][0];
                  return <line x1={toX(lastX)} x2={ml+pw} y1={toY(c.floor)} y2={toY(c.floor)}
                    stroke={c.color} strokeWidth={1} strokeDasharray="2 4" opacity={0.35} />;
                })()}
                {/* Inflection marker */}
                {c.inflection && !c.theoretical && (
                  <circle cx={toX(c.inflection.x)} cy={toY(c.inflection.y)} r={5}
                    fill={c.color} stroke="#0f1623" strokeWidth={1.5} opacity={0.9} />
                )}
                {/* Current position dot */}
                {!c.theoretical && (
                  <g>
                    <circle cx={toX(c.currentX)} cy={toY(c.currentY)} r={8}
                      fill={c.color} stroke="#080c18" strokeWidth={2} />
                    <circle cx={toX(c.currentX)} cy={toY(c.currentY)} r={12}
                      fill="none" stroke={c.color} strokeWidth={1} opacity={0.3} />
                  </g>
                )}
              </g>
            );
          })}

          {/* LRAC Envelope */}
          {showEnv && lracPts.length >= 2 && (
            <path d={ptsToPath(lracPts)} fill="none"
              stroke="rgba(255,255,255,0.75)" strokeWidth={2.5} />
          )}

          {/* "Today" label on TI dot */}
          {!hidden['ti'] && (() => {
            const ti = LRAC_CURVES[0];
            return (
              <text x={toX(ti.currentX)} y={toY(ti.currentY)-14}
                textAnchor="middle" fontSize={8} fill="#3b82f6" fontFamily="SF Mono,monospace"
                fontWeight={700}>TODAY</text>
            );
          })()}

          {/* Crossover annotation: SC→TI handoff on LRAC */}
          {showEnv && (() => {
            // Find where TI beats SC IBM floor (~1000 LQ)
            const cx = toX(950), cy = toY(52);
            return (
              <g>
                <line x1={cx} y1={cy-20} x2={cx} y2={cy-4} stroke="rgba(255,255,255,0.3)"
                  strokeWidth={1} strokeDasharray="2 2" />
                <text x={cx} y={cy-24} textAnchor="middle" fontSize={7.5}
                  fill="rgba(255,255,255,0.4)" fontFamily="SF Mono,monospace">TI passes</text>
                <text x={cx} y={cy-15} textAnchor="middle" fontSize={7.5}
                  fill="rgba(255,255,255,0.4)" fontFamily="SF Mono,monospace">cryo floor →</text>
              </g>
            );
          })()}

          {/* Border */}
          <rect x={ml} y={mt} width={pw} height={ph} fill="none"
            stroke="rgba(255,255,255,0.07)" strokeWidth={1} />
        </svg>
      </div>

      {/* Curve notes */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(290px, 1fr))', gap: 8, marginTop: 12 }}>
        {LRAC_CURVES.filter(c => !c.dim).map(c => (
          <div key={c.id} style={{
            background: 'rgba(255,255,255,0.02)', border: '1px solid rgba(255,255,255,0.04)',
            borderRadius: 6, padding: '8px 12px',
            borderLeft: `3px solid ${c.color}${c.theoretical ? '55' : 'bb'}`,
            opacity: hidden[c.id] ? 0.4 : 1, transition: 'opacity 0.15s',
          }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: c.color, marginBottom: 2, opacity: c.theoretical ? 0.65 : 1 }}>
              {c.label} {c.theoretical && <span style={{ fontSize: 8, color: '#475569', fontWeight: 400 }}>◇ THEORETICAL</span>}
            </div>
            <div style={{ fontSize: 9, color: '#64748b', marginBottom: 5 }}>{c.sublabel}</div>
            <div style={{ fontSize: 10, color: '#94a3b8', lineHeight: 1.55 }}>{c.note}</div>
            {c.floor && (
              <div style={{ fontSize: 9, color: '#475569', marginTop: 5, borderTop: '1px solid rgba(255,255,255,0.04)', paddingTop: 4 }}>
                {c.theoretical ? 'Theoretical floor' : 'Structural floor'}: ~{c.floor} (cost index) — cost curve flattens here regardless of scale
              </div>
            )}
            {c.inflection && !c.theoretical && (
              <div style={{ fontSize: 9, color: c.color, opacity: 0.7, marginTop: 4 }}>
                ● Inflection at ~{c.inflection.x >= 1000 ? `${c.inflection.x/1000}K` : c.inflection.x} LQ: {c.inflection.label}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ─── GLOSSARY ─────────────────────────────────────────── */

const GLOSS_LAYERS = [
  { id:'ground',    label:'Ground',                    color:'#f59e0b', desc:'Start here. No prior knowledge assumed.' },
  { id:'physics',   label:'Physics',                   color:'#3b82f6', desc:'How qubits behave in the real world.' },
  { id:'modality',  label:'Modalities',                color:'#06b6d4', desc:'The seven physical implementations of a qubit.' },
  { id:'qec',       label:'Error Correction',          color:'#8b5cf6', desc:'How raw qubits become reliable logical qubits.' },
  { id:'scaling',   label:'Scaling to Fault Tolerance',color:'#10b981', desc:'The physics and architecture of getting from here to there.' },
  { id:'econ',      label:'Economics',                 color:'#f97316', desc:'Cost structure, trajectories, and the holy grail metric.' },
  { id:'market',    label:'Market',                    color:'#ec4899', desc:'Commercial landscape and where the industry is heading.' },
];

const GT = { // GLOSS_TERMS shorthand
  qubit:{ label:'Qubit', layer:'ground', monroe:false, buildsOn:[], unlocks:['superposition','entanglement','quantum_gate'],
    def:`The basic unit of quantum information. A classical bit is either 0 or 1 — no ambiguity. A qubit can exist in a combination of both simultaneously while a computation runs, a property called superposition. When measured, it resolves to a definite 0 or 1. Everything in quantum computing starts here.` },

  superposition:{ label:'Superposition', layer:'ground', monroe:false, buildsOn:['qubit'], unlocks:['quantum_gate','entanglement'],
    def:`A qubit's ability to exist in multiple states at the same time while a computation is in progress. It is not that the qubit is secretly one or the other and you don't know — it genuinely occupies both until measurement forces a choice. A system of N qubits in superposition explores 2ᴺ possible states simultaneously. Harnessing that exploration to produce a useful answer is the entire challenge of quantum algorithm design.` },

  entanglement:{ label:'Entanglement', layer:'ground', monroe:false, buildsOn:['qubit','superposition'], unlocks:['quantum_gate','qec'],
    def:`A correlation between two or more qubits such that the state of one instantly determines the states of the others, regardless of physical distance. Once entangled, qubits share a joint quantum state — operating on one implicitly acts on all. Entanglement is what allows coordinated operations across many qubits simultaneously. Without it, a quantum computer is just a slow classical computer.` },

  quantum_gate:{ label:'Quantum Gate', layer:'ground', monroe:false, buildsOn:['qubit','superposition','entanglement'], unlocks:['gate_fidelity','error_rate'],
    def:`An operation applied to one or more qubits — the quantum equivalent of AND/OR/NOT logic gates in classical computing. Single-qubit gates rotate a qubit's state. Two-qubit gates create entanglement between qubits and are where most errors occur. Running an algorithm means executing a specific sequence of gates — a circuit — on qubits. Gate quality is measured by fidelity.` },

  gate_fidelity:{ label:'Gate Fidelity', layer:'physics', monroe:false, buildsOn:['quantum_gate'], unlocks:['error_rate','physical_logical_ratio'],
    def:`How accurately a gate operation executes, expressed as a percentage. 99.99% fidelity means 1 error per 10,000 gate operations. The gap between 99% and 99.99% sounds small but compounds catastrophically — 1,000 sequential gates at 99% gives a 0.004% chance of a perfect result. Highest demonstrated two-qubit fidelity: IonQ at 99.99%. The general threshold for fault-tolerant computation is 99.9%+.` },

  error_rate:{ label:'Error Rate', layer:'physics', monroe:false, buildsOn:['gate_fidelity'], unlocks:['qec','physical_qubit','logical_qubit'],
    def:`The probability a gate operation introduces an error — the inverse of gate fidelity. A 99.9% fidelity gate has a 0.1% error rate. Errors accumulate multiplicatively across every gate in a circuit, making long computations unreliable without correction. Below a critical threshold, error correction becomes net-positive. Above it, adding more correction makes things worse.` },

  coherence_time:{ label:'Coherence Time (T1/T2)', layer:'physics', monroe:false, buildsOn:['qubit'], unlocks:['decoherence','gate_vs_algo'],
    def:`How long a qubit maintains its quantum state before environmental noise destroys it. T1 (energy relaxation): the qubit loses its excited state. T2 (dephasing): the qubit loses phase coherence needed for interference. A 100μs coherence window means an algorithm must complete within that time. Trapped ions: seconds to minutes. Superconducting: 100–250μs. The 1,000× coherence advantage of trapped ions partially compensates for their 100,000× speed disadvantage.` },

  decoherence:{ label:'Decoherence', layer:'physics', monroe:false, buildsOn:['coherence_time'], unlocks:['modality','natural_synthetic'],
    def:`The process by which a qubit loses its quantum properties through interaction with its environment. Heat, electromagnetic noise, vibration, stray photons — any physical interaction can collapse the fragile quantum state. Decoherence is why quantum computers require extreme isolation: dilution refrigerators, ultra-high vacuum, magnetic shielding. It is the fundamental enemy. Modality choice is largely a decision about which physical substrate fights decoherence most effectively at scale.` },

  modality:{ label:'Modality', layer:'physics', monroe:false, buildsOn:['decoherence'], unlocks:['trapped_ion','neutral_atom','superconducting','cat_qubit','photonic','topological','silicon_spin','annealing'],
    def:`The physical system chosen to implement a qubit. Trapped ions, superconducting circuits, neutral atoms, photons, silicon spin — all can be qubits, each with a distinct profile across fidelity, speed, coherence, error correction overhead, and manufacturing cost. Choosing a modality means choosing your entire cost structure and scaling trajectory. There is no universal winner — each modality dominates different terms in the cost per useful computation equation.` },

  trapped_ion:{ label:'Trapped Ion', layer:'modality', monroe:false, buildsOn:['modality'], unlocks:['natural_synthetic','photonic_crossover','p2_to_p'],
    def:`Ions (electrically charged atoms) suspended in vacuum by electromagnetic fields, manipulated by lasers or microwave electronics. Natural qubits — all ions of the same element are physically identical, zero manufacturing variation, zero drift. Best gate fidelity of any modality (IonQ: 99.99%). Coherence of seconds to minutes. Gate speed is slow (~1 kHz), but full all-to-all connectivity and exceptional QEC efficiency (Quantinuum's 2:1 physical-to-logical ratio) make total computation cost competitive. IonQ and Quantinuum are the leading commercial players.` },

  neutral_atom:{ label:'Neutral Atom', layer:'modality', monroe:false, buildsOn:['modality'], unlocks:['natural_synthetic','modular_vs_monolithic'],
    def:`Uncharged atoms held in position by focused laser beams called optical tweezers, entangled via Rydberg states (high-energy electron excitations). Natural qubits — all atoms of the same isotope are identical. Exceptional coherence (strontium: ~40 seconds). Best native connectivity: atoms can be physically rearranged in 2D or 3D arrays. QuEra demonstrated 96 logical qubits in 2025 — the current record. The modality was sociologically delayed ~10 years (the atomic physics community was focused on Bose-Einstein condensation) — a maturity gap, not a physics gap.` },

  superconducting:{ label:'Superconducting', layer:'modality', monroe:false, buildsOn:['modality'], unlocks:['natural_synthetic','calibration_drift','cost_floor','surface_code'],
    def:`Superconducting circuits cooled to ~15 millikelvin (colder than outer space) that exhibit macroscopic quantum behavior. Fastest gate speed (~100 MHz). Most mature manufacturing — CMOS-compatible, semiconductor fab built. Dominant early commercial position: IBM, Google. Key weaknesses: short coherence (100–250μs), nearest-neighbor-only connectivity (requires SWAP chains), dilution refrigerators (structural cost floor), and synthetic qubits that drift over time requiring super-linear calibration effort at scale.` },

  cat_qubit:{ label:'Cat Qubit', layer:'modality', monroe:false, buildsOn:['modality','superconducting'], unlocks:['physical_logical_ratio'],
    def:`A superconducting qubit that encodes information in 'cat states' — superpositions of opposite-phase coherent states — to exponentially suppress one error type (bit-flips) while accepting more phase-flip errors. The asymmetry allows simpler 1D repetition codes instead of 2D surface codes, targeting ~16:1 physical-to-logical ratio vs ~1,000:1 for standard superconducting. Still requires dilution refrigerators. Alice & Bob (Paris) is the leading company. Commercial target: 2030.` },

  photonic:{ label:'Photonic', layer:'modality', monroe:false, buildsOn:['modality'], unlocks:['physical_logical_ratio','cost_floor','modular_vs_monolithic'],
    def:`Photons (particles of light) used as qubits, manipulated via beamsplitters and single-photon detectors. Room temperature, speed of light, CMOS manufacturing. Fatal flaw: photons don't naturally interact, requiring probabilistic fusion gates that succeed only ~50% of the time. This probabilistic success rate (distinct from gate fidelity) drives catastrophic QEC overhead: >1,000,000 physical photons per logical qubit. PsiQuantum ($7B) and Xanadu (XNDU) are the leaders. Zero quantum computation demonstrated to date.` },

  topological:{ label:'Topological', layer:'modality', monroe:true, buildsOn:['modality'], unlocks:['natural_synthetic'],
    def:`A theoretical qubit type storing information in the topology of exotic quasiparticles called Majorana fermions, intrinsically protected from local disturbances by their global structure. Monroe called it "the string theory of quantum computing" — mathematically elegant, real-world existence still contested. Microsoft's approach. Two-qubit gates have not been demonstrated as of early 2026. Highest risk, highest theoretical reward. DARPA US2QC Stage C selection is the strongest external validation.` },

  silicon_spin:{ label:'Silicon Spin', layer:'modality', monroe:false, buildsOn:['modality'], unlocks:['natural_synthetic','calibration_drift','modular_vs_monolithic'],
    def:`The spin state of electrons or nuclei in silicon quantum dots, manufacturable on standard 300mm CMOS fabs. The thesis: the same economics that drove transistors from thousands to billions apply to qubits — Intel's Tunnel Falls chip is the leading example. Smallest qubit of any modality. Critical gaps: no logical qubit demonstrated, calibration of densely packed synthetic qubits at scale unsolved, and control wiring doesn't scale like passive transistors — each qubit requires active electronics.` },

  annealing:{ label:'Annealing', layer:'modality', monroe:false, buildsOn:['modality'], unlocks:['annealing_vs_gate','quantum_advantage'],
    def:`A quantum approach that finds minimum-energy configurations by slowly cooling quantum fluctuations — useful for optimization but not universal. Cannot run arbitrary algorithms, has no proven path to fault tolerance. D-Wave: 5,000+ annealing qubits, 135+ commercial customers. The only quantum computing approach with meaningful deployed optimization revenue today. D-Wave's 2026 acquisition of QCI (gate-model) reflects an attempt to pivot toward the more general gate-model paradigm.` },

  physical_qubit:{ label:'Physical Qubit', layer:'qec', monroe:false, buildsOn:['modality'], unlocks:['logical_qubit','physical_logical_ratio','qec'],
    def:`A real, hardware-level qubit — a trapped ion, a superconducting circuit, a neutral atom. Physical qubits are imperfect: they have error rates, lose coherence, and require correction. Most headlines about qubit counts ('IBM's 1,000-qubit chip') refer to physical qubits. Physical count is a misleading headline metric. What matters is how many logical qubits they can produce, which depends entirely on error correction overhead.` },

  logical_qubit:{ label:'Logical Qubit', layer:'qec', monroe:false, buildsOn:['physical_qubit','qec'], unlocks:['physical_logical_ratio','fault_tolerance','below_threshold'],
    def:`An error-corrected qubit built from many physical qubits working together to form a reliable, protected unit of computation. Where physical qubits have error rates of 0.1–1%, logical qubits can reach 10⁻⁶ or better through redundancy and constant monitoring. Logical qubits are what actually run commercially useful algorithms. The ratio of physical to logical is the central cost variable in all of quantum computing.` },

  qec:{ label:'Quantum Error Correction (QEC)', layer:'qec', monroe:false, buildsOn:['physical_qubit','entanglement'], unlocks:['logical_qubit','physical_logical_ratio','surface_code','qldpc','fault_tolerance'],
    def:`The science of detecting and correcting errors without directly measuring — and destroying — the quantum state. Uses extra ancilla qubits to perform indirect syndrome measurements that reveal which errors occurred without revealing the data. Like recovering a corrupted file using checksums. QEC only helps if physical error rates are below the error threshold. Above it, QEC introduces more errors than it fixes.` },

  physical_logical_ratio:{ label:'Physical-to-Logical Ratio', layer:'qec', monroe:false, buildsOn:['logical_qubit','qec'], unlocks:['cost_per_computation','natural_synthetic','lrac_curve'],
    def:`The number of physical qubits required to produce one reliable logical qubit. The single most important cost metric in quantum computing. Current best: Quantinuum ~2:1 (demonstrated). IBM qLDPC ~24:1. Standard superconducting surface code ~1,000:1. Photonic (theoretical) >1,000,000:1. This ratio multiplies directly into hardware cost — a 2:1 ratio requires 500× less hardware than a 1,000:1 ratio for identical computation. Trapped ion's all-to-all connectivity is the root cause of its exceptional ratio: fewer SWAP chains means fewer wasted operations.` },

  surface_code:{ label:'Surface Code', layer:'qec', monroe:false, buildsOn:['qec'], unlocks:['qldpc','physical_logical_ratio'],
    def:`The dominant quantum error correction code today. Arranges qubits on a 2D grid, performing syndrome measurements on neighboring pairs to detect errors. Robust and well-understood but expensive: ~1,000 physical qubits per logical qubit for near-threshold superconducting hardware. Superconducting chip topology (nearest-neighbor fixed grid) was optimized for surface codes, creating a mutual dependency. IBM's qLDPC breakthrough is specifically an attempt to escape the 1,000:1 constraint.` },

  qldpc:{ label:'qLDPC', layer:'qec', monroe:false, buildsOn:['surface_code'], unlocks:['physical_logical_ratio','demonstrated_theoretical'],
    def:`Quantum Low-Density Parity-Check codes — more efficient than surface codes by using longer-range qubit connections. IBM's [[144,12,12]] qLDPC achieves ~24:1 (288 physical → 12 logical), ~40× better than standard surface code. The c-coupler architecture in IBM's Loon processor was built specifically to enable qLDPC connectivity. Critically: an algorithmic innovation, not a qubit physics innovation. It improves error correction efficiency without fixing the underlying calibration drift problem of synthetic qubits.` },

  fault_tolerance:{ label:'Fault Tolerance', layer:'qec', monroe:false, buildsOn:['logical_qubit','qec'], unlocks:['below_threshold','ftqc'],
    def:`The property of a computation that continues producing correct results even as individual components fail and are corrected. Fault-tolerant systems catch and correct errors faster than they accumulate, enabling arbitrarily long algorithms. No system has achieved full fault tolerance yet. All commercially significant quantum algorithms — molecular simulation, Shor's factoring, phase estimation — require it. The threshold between the current NISQ era and commercially useful quantum computing.` },

  below_threshold:{ label:'Below Threshold', layer:'qec', monroe:false, buildsOn:['fault_tolerance','qec'], unlocks:['ftqc'],
    def:`The critical milestone where physical error rates drop low enough that adding more error correction makes computation more reliable rather than less. Above threshold: QEC makes things worse (it introduces errors faster than it corrects them). Below threshold: each additional correction layer reduces the logical error rate exponentially. Quantinuum and QuEra have demonstrated below-threshold logical qubit operation. Crossing this threshold means the path to arbitrarily low logical error rates is open.` },

  natural_synthetic:{ label:'Natural vs Synthetic Qubit', layer:'scaling', monroe:true, buildsOn:['trapped_ion','neutral_atom','superconducting','silicon_spin'], unlocks:['calibration_drift'],
    def:`Monroe's most important taxonomy. Natural qubits (trapped ions, neutral atoms) are identical by physics — all ions of the same element are exactly the same, with zero manufacturing variation and zero drift over time. Synthetic qubits (superconducting, silicon spin) are fabricated — non-identical and change over time. The implication: natural qubit systems never face a uniformity problem as they scale. Synthetic qubit systems face calibration challenges that grow worse as the system grows larger. Monroe: "physics gives you identity for free."` },

  calibration_drift:{ label:'Calibration Drift', layer:'scaling', monroe:true, buildsOn:['natural_synthetic','superconducting'], unlocks:['cost_floor','demonstrated_theoretical'],
    def:`The tendency of synthetic qubits to change operating parameters over time, requiring constant recalibration. The scaling trap: calibration effort grows worse than linearly with qubit count. Adding qubit N requires re-characterizing its interactions with every existing qubit. At 100 qubits this is manageable; at 10,000 it becomes the dominant engineering cost. Monroe: "even when you make synthetic qubits, they change over time, and the bigger the system, the harder it is to calibrate." IBM's pivot away from raw qubit count scaling is an implicit acknowledgment. A physics problem wearing engineering clothes — better fabrication does not fix a fundamentally non-uniform substrate.` },

  gate_vs_algo:{ label:'Gate Speed vs Algorithmic Throughput', layer:'scaling', monroe:true, buildsOn:['coherence_time','physical_logical_ratio'], unlocks:['cost_per_computation'],
    def:`The distinction Monroe says "people miss." Gate speed is how fast one operation executes: trapped ion ~1 kHz, superconducting ~100 MHz — a 100,000× raw difference. Algorithmic throughput is how fast a complete computation runs to a correct answer — and they diverge dramatically. Full qubit connectivity eliminates SWAP chains (sequences of gates that move information across a fixed-topology chip). Low QEC overhead means fewer total operations per logical step. A 1 kHz gate requiring 10 operations can produce an answer faster and more reliably than a 100 MHz gate requiring 10,000 operations for the same logical step.` },

  p2_to_p:{ label:'P²→P Conversion', layer:'scaling', monroe:true, buildsOn:['trapped_ion','photonic_crossover'], unlocks:['modular_vs_monolithic'],
    def:`The core of IonQ's Lightsynq acquisition. Connecting two ions on separate QPU chips via photonic link requires collecting a photon from each — probability P per ion, joint success P². At P=1%, that's 0.01% success: one working link per 10,000 attempts. Lightsynq's silicon-vacancy quantum memory acts as a photon waiting room: capture the first photon, store it, wait for the second. Joint probability becomes P×1 = P — a 100× improvement at current efficiencies, improving further as P itself improves. Converts a quadratic scaling problem into a linear one. The engineering bridge that makes photonic modular scaling commercially viable.` },

  photonic_crossover:{ label:'Photonic Crossover', layer:'scaling', monroe:true, buildsOn:['trapped_ion'], unlocks:['p2_to_p','modular_vs_monolithic'],
    def:`The point at which the entanglement rate between qubits on different QPU chips (via photonic links) exceeds the gate rate between qubits on the same chip. When this crossover occurs, chip boundaries disappear — a qubit on chip 1 and a qubit on chip 47 become as connected as two adjacent qubits. The computer stops being a chip and becomes the entire network. Monroe tracked inter-QPU entanglement rate improving from 10⁻³ Hz to ~200 Hz over 17 years — five orders of magnitude, exponential. The intra-QPU rate is essentially flat. The lines are converging. This is IonQ's founding thesis.` },

  modular_vs_monolithic:{ label:'Modular vs Monolithic Scaling', layer:'scaling', monroe:true, buildsOn:['photonic_crossover','neutral_atom','silicon_spin'], unlocks:['cost_per_computation','lrac_curve'],
    def:`The fundamental architectural fork. Monolithic: build one very large chip with all qubits on a single substrate — neutral atoms, silicon spin, photonic, EeroQ's electrons on helium. Simpler for early customers, no networking overhead, faster raw qubit count. Modular: build many smaller high-quality QPU chips connected via photonic links — IonQ's approach. Manufacturing yield (swap a defective module rather than scrapping the system), full connectivity at photonic crossover, scales like server racks. Neither is universally superior — application class, timeline, and whether the photonic crossover arrives determine which wins for a given use case.` },

  demonstrated_theoretical:{ label:'Demonstrated vs Theoretical Curve', layer:'scaling', monroe:true, buildsOn:['physical_logical_ratio','calibration_drift'], unlocks:['cost_per_computation','deflationary_curve'],
    def:`Monroe's framework for pricing quantum promises. A demonstrated cost curve has published data points at multiple scales — you can draw a line and price the next point with confidence because the curve has been walked. A theoretical cost curve has no data points — only projections on slides. Monroe walked the photonic interconnect rate personally over 17 years (10⁻³ Hz to 200 Hz, five orders of magnitude), every intermediate point published and referenced. PsiQuantum projects a million-qubit system but has demonstrated zero quantum computation. In this app, scores are set at the demonstrated point on each curve, not the projected endpoint.` },

  cost_per_computation:{ label:'Cost per Useful Computation', layer:'econ', monroe:false, buildsOn:['physical_logical_ratio','gate_vs_algo','demonstrated_theoretical'], unlocks:['deflationary_curve','cost_floor','lrac_curve'],
    def:`The holy grail metric: the total cost to execute one reliable quantum operation producing a commercially valuable result. Decomposes as: (cost per physical qubit) × (physical-to-logical ratio) × (time per logical operation). One catastrophic term dominates the product regardless of how strong the others are — a 1,000,000:1 ratio makes every other factor irrelevant. This is why a weighted geometric mean, not an arithmetic average, is the correct scoring structure. Every quantum investment thesis reduces to: who reaches the lowest cost per useful computation first, and can they defend that position?` },

  deflationary_curve:{ label:'Deflationary Cost Curve', layer:'econ', monroe:false, buildsOn:['cost_per_computation','demonstrated_theoretical'], unlocks:['lrac_curve'],
    def:`A modality whose cost per useful computation falls consistently as scale increases, with no structural floor preventing it from reaching utility economics. Trapped ion is the clearest example: room-temperature operation, semiconductor manufacturing (SkyWater), and modular photonic scaling combine to give no architectural cost floor. A deflationary cost curve is the single most important long-run competitive attribute. Most cost curves are deflationary in the short run — few remain deflationary at scale, where structural floors emerge.` },

  cost_floor:{ label:'Cost Floor', layer:'econ', monroe:false, buildsOn:['deflationary_curve','superconducting','calibration_drift'], unlocks:['lrac_curve'],
    def:`The minimum cost per useful computation a modality can reach regardless of manufacturing improvements or scale. For superconducting: the dilution refrigerator is structural — you cannot operate SC qubits without it, and its cooling infrastructure never trends toward zero cost. For photonics: the >1,000,000:1 QEC overhead creates a floor even with free CMOS manufacturing. A modality with a cost floor will be displaced by modalities without one in any application requiring near-commodity pricing. Identifying structural floors separates genuine long-run winners from strong early movers.` },

  lrac_curve:{ label:'LRAC Curve', layer:'econ', monroe:false, buildsOn:['cost_per_computation','cost_floor','deflationary_curve'], unlocks:['utility_threshold'],
    def:`Long-Run Average Cost — borrowed directly from microeconomics. In classical economics, the LRAC envelope traces the minimum achievable average cost at each scale of production, connecting the bottoms of short-run cost curves for different capital investment levels. Applied to quantum: each modality has a distinct cost structure and trajectory. The LRAC envelope shows which modality is cheapest at any given logical qubit scale. The strategic insight: what matters is not who is cheapest today, but which trajectory crosses the utility threshold first without hitting a structural cost floor.` },

  utility_threshold:{ label:'Utility Threshold', layer:'econ', monroe:false, buildsOn:['lrac_curve','quantum_advantage'], unlocks:['ftqc','qcaas'],
    def:`The point where cost per useful quantum computation drops low enough for a customer to prefer the quantum answer over the best available classical solver. Application-dependent: molecular simulation requires different scale and fidelity than logistics optimization or financial portfolio rebalancing. No modality has crossed the utility threshold for general-purpose computation. The transition from "pay to access the machine" to "pay because the answer is better than classical" is the defining commercialization inflection the industry is working toward.` },

  classical_sim_limit:{ label:'Classical Simulation Limit', layer:'econ', monroe:false, buildsOn:['logical_qubit','quantum_advantage'], unlocks:['utility_threshold'],
    def:`The qubit scale at which classical computers can no longer efficiently simulate the quantum system. Below this boundary, a powerful GPU cluster can solve the same problem faster and cheaper — quantum provides no advantage. Rough estimates: 50–100 fully-connected high-fidelity logical qubits for quantum chemistry; much higher for optimization (classical heuristics for routing and scheduling are surprisingly strong). Quantum creates value only beyond this line. Shown as the shaded zone on the left side of the LRAC chart.` },

  quantum_advantage:{ label:'Quantum Advantage', layer:'market', monroe:false, buildsOn:['classical_sim_limit','fault_tolerance'], unlocks:['utility_threshold','crqc'],
    def:`The point at which a quantum computer solves a practically relevant problem faster or cheaper than any classical computer. Currently demonstrated only in narrow benchmarks: Google's random circuit sampling (2019) and factoring small numbers. Commercially relevant quantum advantage — solving a problem a customer pays to solve better — has not been demonstrated for gate-model quantum computing. D-Wave provides heuristic optimization advantage for specific problem types. Molecular simulation, cryptography, and financial optimization remain the primary commercial destinations.` },

  nisq:{ label:'NISQ', layer:'market', monroe:false, buildsOn:['physical_qubit','qec'], unlocks:['ftqc','below_threshold'],
    def:`Noisy Intermediate-Scale Quantum — the current era. Machines with 50–1,000 physical qubits, too noisy for full error correction and too large for classical computers to efficiently simulate. Coined by physicist John Preskill in 2018. NISQ machines can run limited algorithms and demonstrate interesting phenomena, but cannot reliably solve commercially significant problems. The entire industry's primary goal is exiting the NISQ era. Most quantum companies' current revenue is "NISQ access fees" rather than payment for demonstrated advantage.` },

  ftqc:{ label:'FTQC', layer:'market', monroe:false, buildsOn:['fault_tolerance','below_threshold','logical_qubit'], unlocks:['crqc','qcaas','utility_threshold'],
    def:`Fault-Tolerant Quantum Computing — the destination. Quantum computers using full error correction to run arbitrarily long algorithms reliably, producing correct results regardless of component failures. Requires physical error rates below threshold, sufficient logical qubits, and fast enough classical control. All commercially significant quantum algorithms require FTQC. Expert consensus on timeline: 50% probability by ~2037–2040. The entire quantum investment narrative is a bet on this transition and on which modality and company leads when it arrives.` },

  crqc:{ label:'CRQC', layer:'market', monroe:false, buildsOn:['ftqc'], unlocks:[],
    def:`Cryptographically Relevant Quantum Computer — a fault-tolerant machine powerful enough to run Shor's algorithm and break RSA/elliptic-curve encryption protecting most of the world's digital infrastructure. Requires millions of high-quality logical qubits. IonQ's stated internal target: 2028. Expert consensus: <1% probability by 2028, ~50% by ~2037–2040. The CRQC threat drives government funding, DARPA contracts, and NIST's published post-quantum cryptography standards. Today's quantum revenue is largely preparation for — and defense against — an event that has not happened and may be a decade away.` },

  qcaas:{ label:'QCaaS', layer:'market', monroe:false, buildsOn:['quantum_advantage','ftqc'], unlocks:[],
    def:`Quantum Computing as a Service — accessing quantum computers via cloud (AWS Braket, Azure Quantum, Google Cloud) or on-premise subscription, paying per circuit execution rather than owning hardware. IonQ's primary revenue model ($130M FY2025). Current customer journey: researchers and enterprises pay for access to experiment. The commercial inflection point: transition from "pay to access" to "pay because the quantum answer is provably better than classical." The entire industry is working toward this shift.` },

  annealing_vs_gate:{ label:'Annealing vs Gate-Model', layer:'market', monroe:false, buildsOn:['annealing','quantum_gate'], unlocks:['quantum_advantage','qcaas'],
    def:`Two fundamentally different paradigms of quantum computation. Annealing finds minimum-energy states — useful for optimization, not universal, no proven path to fault tolerance. Gate-model executes arbitrary sequences of quantum operations — universal, the platform for all commercially significant algorithms including Shor's, Grover's, phase estimation, and variational methods. D-Wave (annealing) is the only quantum company with proven deployed optimization revenue. Gate-model companies have broader long-run commercial scope but are still closing the gap to demonstrated quantum advantage.` },
};

function GlossaryTab() {
  const [expanded, setExpanded] = React.useState(null);
  const [search, setSearch] = React.useState('');
  const layerRefs = React.useRef({});

  const openTerm = (id) => {
    setExpanded(prev => prev === id ? null : id);
    const layer = GT[id]?.layer;
    if (layer && layerRefs.current[layer]) {
      setTimeout(() => layerRefs.current[layer].scrollIntoView({ behavior:'smooth', block:'start' }), 60);
    }
  };

  const totalTerms = Object.keys(GT).length;

  return (
    <div>
      {/* Header strip */}
      <div style={{ display:'flex', alignItems:'center', gap:16, marginBottom:20, flexWrap:'wrap' }}>
        <input value={search} onChange={e => setSearch(e.target.value)}
          placeholder="Search terms..."
          style={{ padding:'6px 12px', background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.1)', borderRadius:5, color:'#e2e8f0', fontSize:11, fontFamily:'inherit', outline:'none', width:200 }} />
        <span style={{ fontSize:10, color:'#475569' }}>{totalTerms} terms · 7 concept layers</span>
        <span style={{ fontSize:10, color:'#2d3748', marginLeft:'auto' }}>◈ = sourced from Chris Monroe keynote, PQI 2025</span>
      </div>

      {GLOSS_LAYERS.map((layer, li) => {
        const layerTermIds = Object.entries(GT)
          .filter(([,t]) => t.layer === layer.id)
          .filter(([,t]) => !search || t.label.toLowerCase().includes(search.toLowerCase()))
          .map(([id]) => id);
        if (!layerTermIds.length && search) return null;
        const expandedHere = expanded && GT[expanded]?.layer === layer.id && layerTermIds.includes(expanded);

        return (
          <div key={layer.id} ref={el => layerRefs.current[layer.id] = el} style={{ marginBottom:26 }}>
            {/* Layer header */}
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10, paddingBottom:8, borderBottom:`1px solid ${layer.color}22` }}>
              <div style={{ width:7, height:7, borderRadius:'50%', background:layer.color, flexShrink:0 }} />
              <span style={{ fontSize:10, fontWeight:700, color:layer.color, letterSpacing:'0.8px', textTransform:'uppercase' }}>{layer.label}</span>
              <span style={{ fontSize:10, color:'#2d3748' }}>·</span>
              <span style={{ fontSize:10, color:'#475569' }}>{layer.desc}</span>
            </div>

            {/* Chips */}
            <div style={{ display:'flex', flexWrap:'wrap', gap:7, marginBottom: expandedHere ? 10 : 0 }}>
              {layerTermIds.map(tid => {
                const t = GT[tid];
                const isExp = expanded === tid;
                return (
                  <button key={tid} onClick={() => openTerm(tid)} style={{
                    padding:'5px 11px',
                    background: isExp ? `${layer.color}18` : 'rgba(255,255,255,0.03)',
                    border:`1px solid ${isExp ? layer.color+'55' : 'rgba(255,255,255,0.07)'}`,
                    borderRadius:4, color: isExp ? layer.color : '#94a3b8',
                    fontSize:11, fontWeight: isExp ? 700 : 400,
                    cursor:'pointer', fontFamily:'inherit', transition:'all 0.12s',
                  }}>
                    {t.label}
                    {t.monroe && <span style={{ marginLeft:5, fontSize:8, color:'#10b981' }}>◈</span>}
                  </button>
                );
              })}
            </div>

            {/* Expanded panel — full width, below chips */}
            {expandedHere && (
              <div style={{
                background:'rgba(255,255,255,0.015)',
                border:`1px solid ${layer.color}22`,
                borderLeft:`3px solid ${layer.color}`,
                borderRadius:'0 6px 6px 0',
                padding:'14px 18px',
                marginTop:4,
              }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:8 }}>
                  <span style={{ fontSize:13, fontWeight:700, color:layer.color }}>{GT[expanded].label}</span>
                  {GT[expanded].monroe && (
                    <span style={{ fontSize:9, color:'#10b981', background:'rgba(16,185,129,0.1)', padding:'2px 6px', borderRadius:3 }}>◈ Monroe</span>
                  )}
                </div>
                <div style={{ fontSize:12, color:'#cbd5e1', lineHeight:1.75, marginBottom:12 }}>
                  {GT[expanded].def}
                </div>
                <div style={{ display:'flex', flexWrap:'wrap', gap:16 }}>
                  {GT[expanded].buildsOn.length > 0 && (
                    <div>
                      <span style={{ fontSize:9, fontWeight:700, color:'#475569', letterSpacing:'0.5px', textTransform:'uppercase' }}>Builds on: </span>
                      {GT[expanded].buildsOn.map((bid,i) => (
                        <span key={bid}>
                          {i > 0 && <span style={{ color:'#2d3748', margin:'0 3px' }}>·</span>}
                          <button onClick={() => openTerm(bid)} style={{ background:'none', border:'none', color:'#60a5fa', fontSize:11, cursor:'pointer', fontFamily:'inherit', padding:0, textDecoration:'underline', textUnderlineOffset:2 }}>
                            {GT[bid]?.label}
                          </button>
                        </span>
                      ))}
                    </div>
                  )}
                  {GT[expanded].unlocks.length > 0 && (
                    <div>
                      <span style={{ fontSize:9, fontWeight:700, color:'#475569', letterSpacing:'0.5px', textTransform:'uppercase' }}>Unlocks: </span>
                      {GT[expanded].unlocks.map((uid,i) => (
                        <span key={uid}>
                          {i > 0 && <span style={{ color:'#2d3748', margin:'0 3px' }}>·</span>}
                          <button onClick={() => openTerm(uid)} style={{ background:'none', border:'none', color:'#34d399', fontSize:11, cursor:'pointer', fontFamily:'inherit', padding:0, textDecoration:'underline', textUnderlineOffset:2 }}>
                            {GT[uid]?.label}
                          </button>
                        </span>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            {/* Layer connector */}
            {li < GLOSS_LAYERS.length - 1 && !search && (
              <div style={{ display:'flex', alignItems:'center', gap:8, marginTop:18, opacity:0.25 }}>
                <div style={{ flex:1, height:1, background:'rgba(255,255,255,0.08)' }} />
                <span style={{ fontSize:8, color:'#475569', letterSpacing:'0.5px', textTransform:'uppercase' }}>
                  {GLOSS_LAYERS[li+1].label} ↓
                </span>
                <div style={{ flex:1, height:1, background:'rgba(255,255,255,0.08)' }} />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function ValuationTab({ portfolioStatuses }) {
  const [typeFilter, setTypeFilter] = React.useState('all');
  const [liveCaps, setLiveCaps] = React.useState({});
  const [loading, setLoading] = React.useState(true);

  const PUBLIC_TICKERS = { ionq:'IONQ', rigetti:'RGTI', dwave:'QBTS', infleqtion:'INFQ', xanadu:'XNDU', arqit:'ARQQ', btq:'BTQ-A.TO', ibm:'IBM', microsoft:'MSFT' };

  React.useEffect(() => {
    let active = true;
    Promise.all(Object.entries(PUBLIC_TICKERS).map(([id, ticker]) =>
      fetchYahooMarketCap(ticker).then(r => [id, r]).catch(() => [id, { capB: null, live: false }])
    )).then(results => {
      if (active) { setLiveCaps(Object.fromEntries(results)); setLoading(false); }
    });
    return () => { active = false; };
  }, []);

  const getEffectiveCap = (id) => {
    const mc = MARKET_CAPS[id];
    if (!mc) return { capB: null, live: false };
    const live = liveCaps[id];
    if (live?.capB) return { capB: live.capB, live: true };
    return { capB: mc.capB, live: false };
  };

  const companies = COMPANIES.map(c => ({ ...c, mc: MARKET_CAPS[c.id] || {} }));
  const mainCos = companies.filter(c => c.mc.capStatus && c.mc.capStatus !== 'conglomerate' && getEffectiveCap(c.id).capB !== null);
  const undisclosed = companies.filter(c => c.mc.capStatus && c.mc.capStatus !== 'conglomerate' && getEffectiveCap(c.id).capB === null);
  const conglomerates = companies.filter(c => c.mc.capStatus === 'conglomerate');

  const filtered = typeFilter === 'all' ? mainCos : mainCos.filter(c => c.quantumType === typeFilter);
  const sorted = [...filtered].sort((a, b) => (getEffectiveCap(b.id).capB || 0) - (getEffectiveCap(a.id).capB || 0));
  const maxCap = Math.max(...sorted.map(c => getEffectiveCap(c.id).capB || 0), 0.1);

  const qtTypes = ['platform','hardware','infrastructure','sensing','software','security','networking'];
  const totalTracked = mainCos.reduce((s, c) => s + (getEffectiveCap(c.id).capB || 0), 0);

  const statusChip = (capStatus) => ({
    public:         <span style={{ fontSize:9, color:'#10b981', display:'inline-flex', alignItems:'center', gap:3 }}><span style={{ width:6, height:6, borderRadius:'50%', background:'#10b981', display:'inline-block', animation:'vt-pulse 2s infinite' }} />LIVE</span>,
    ipo_expected:   <span style={{ fontSize:9, color:'#94a3b8' }}>○ IPO Target</span>,
    spac:           <span style={{ fontSize:9, color:'#a78bfa' }}>○ SPAC</span>,
    private_funded: <span style={{ fontSize:9, color:'#64748b' }}>○ Private</span>,
    acquired:       <span style={{ fontSize:9, color:'#64748b' }}>○ Acquired</span>,
  })[capStatus] || <span style={{ fontSize:9, color:'#64748b' }}>○</span>;

  return (
    <div>
      {/* Type filter buttons */}
      <div className="qtum-filters" style={{ marginBottom: 20 }}>
        <button className={`qtum-filter-btn ${typeFilter === 'all' ? 'active' : ''}`} onClick={() => setTypeFilter('all')}>All</button>
        {qtTypes.map(t => {
          const tc = QUANTUM_TYPE_COLORS[t];
          const on = typeFilter === t;
          return (
            <button key={t} onClick={() => setTypeFilter(on ? 'all' : t)} style={{
              padding:'5px 12px', fontSize:10, fontWeight:600, cursor:'pointer', fontFamily:'inherit',
              letterSpacing:'0.3px', borderRadius:4, transition:'all 0.15s',
              background: on ? tc.bg : 'rgba(255,255,255,0.04)',
              border: `1px solid ${on ? `rgba(${tc.rgb},0.5)` : 'var(--border)'}`,
              color: on ? tc.color : 'var(--dim)',
            }}>{tc.label}</button>
          );
        })}
        {loading && <span style={{ fontSize:10, color:'var(--dim)', marginLeft:8, animation:'vt-pulse 2s infinite' }}>fetching live prices…</span>}
      </div>

      <div className="vt-wrap">
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
          <div style={{ fontSize:13, fontWeight:700, color:'#f1f5f9' }}>Quantum Market Map</div>
          <div style={{ fontSize:10, color:'var(--dim)', display:'flex', gap:12 }}>
            <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
              <span style={{ width:7, height:7, borderRadius:'50%', background:'#10b981', display:'inline-block' }} /> Live (Yahoo Finance)
            </span>
            <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
              <span style={{ width:7, height:7, borderRadius:'50%', border:'1.5px solid #475569', display:'inline-block' }} /> Estimated / Target
            </span>
          </div>
        </div>

        {sorted.map(c => {
          const { capB, live } = getEffectiveCap(c.id);
          if (!capB) return null;
          const pct = (capB / maxCap) * 100;
          const tc = QUANTUM_TYPE_COLORS[c.quantumType] || QUANTUM_TYPE_COLORS.hardware;
          const valStr = capB >= 1 ? `$${capB.toFixed(1)}B` : `$${(capB * 1000).toFixed(0)}M`;
          return (
            <div key={c.id} className="vt-bar-row">
              <div className="vt-bar-label" title={c.name}>
                <span style={{ fontWeight:700 }}>{c.name}</span>
                {c.ticker && c.ticker !== 'Private' && c.ticker !== 'Pre-IPO' &&
                  <span style={{ fontSize:9, color:'var(--dim)', marginLeft:4 }}>{c.ticker}</span>}
              </div>
              <div className="vt-bar-track">
                <div className="vt-bar-fill" style={{ width:`${Math.max(pct,0.5)}%`, background:`rgba(${tc.rgb},0.18)`, borderRight:`2px solid rgba(${tc.rgb},0.6)` }}>
                  {pct > 12 && <span style={{ fontSize:9, fontWeight:700, color:tc.color }}>{valStr}</span>}
                </div>
              </div>
              <div className="vt-bar-val">
                {statusChip(c.mc.capStatus)}
                <span style={{ color:'#e2e8f0', minWidth:54, textAlign:'right' }}>{valStr}</span>
              </div>
            </div>
          );
        })}

        {/* Undisclosed section */}

/* ─── DONUT CHART (shared) ─────────────────────────────── */

function DonutChart({ slices, size = 180 }) {
  if (!slices || slices.length === 0 || slices.every(s => !s.pct)) {
    return (
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <circle cx={size/2} cy={size/2} r={size/2 - 14} fill="none" stroke="var(--border)" strokeWidth={2} strokeDasharray="4 4" />
        <text x={size/2} y={size/2 + 5} textAnchor="middle" fontSize={10} fill="var(--dim)" fontFamily="SF Mono, monospace">Empty</text>
      </svg>
    );
  }
  const total = slices.reduce((s, c) => s + (c.pct || 0), 0);
  const cx = size / 2, cy = size / 2, r = size / 2 - 14, ir = r * 0.54;
  let startA = -Math.PI / 2;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {slices.filter(s => s.pct > 0).map((s, i) => {
        const angle = (s.pct / total) * 2 * Math.PI;
        const endA = startA + angle;
        const x1 = cx + r * Math.cos(startA), y1 = cy + r * Math.sin(startA);
        const x2 = cx + r * Math.cos(endA),   y2 = cy + r * Math.sin(endA);
        const ix1 = cx + ir * Math.cos(endA),  iy1 = cy + ir * Math.sin(endA);
        const ix2 = cx + ir * Math.cos(startA), iy2 = cy + ir * Math.sin(startA);
        const lg = angle > Math.PI ? 1 : 0;
        const d = `M ${x1} ${y1} A ${r} ${r} 0 ${lg} 1 ${x2} ${y2} L ${ix1} ${iy1} A ${ir} ${ir} 0 ${lg} 0 ${ix2} ${iy2} Z`;
        const res = <path key={i} d={d} fill={`rgba(${s.rgb || '59,130,246'},0.25)`} stroke={s.color} strokeWidth={1.5} />;
        startA = endA;
        return res;
      })}
      <text x={cx} y={cy - 7} textAnchor="middle" fontSize={9} fill="#64748b" fontFamily="SF Mono, monospace">Allocated</text>
      <text x={cx} y={cy + 10} textAnchor="middle" fontSize={15} fontWeight="800" fill="#f1f5f9" fontFamily="SF Mono, monospace">{total.toFixed(0)}%</text>
    </svg>
  );
}
