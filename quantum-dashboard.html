<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Commercialization Intelligence</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080c18; color: #e2e8f0; font-family: 'SF Mono', 'Fira Code', monospace; min-height: 100vh; }
  :root {
    --bg: #080c18; --card: #0f1623; --card2: #141e2e;
    --border: #1a2640; --border2: #243048;
    --blue: #3b82f6; --green: #10b981; --yellow: #f59e0b;
    --red: #ef4444; --purple: #8b5cf6; --cyan: #06b6d4;
    --orange: #f97316; --pink: #ec4899;
    --dim: #475569; --dimmer: #2d3748;
  }
  .wrap { max-width: 1520px; margin: 0 auto; padding: 20px 24px; }

  /* Header */
  .header { border-bottom: 1px solid var(--border); padding-bottom: 18px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: flex-end; }
  .header-left h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; color: #f8fafc; }
  .header-left p { font-size: 11px; color: var(--dim); margin-top: 3px; }
  .tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.4px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
  .tab { padding: 8px 16px; font-size: 11px; font-weight: 600; cursor: pointer; background: none; border: none; color: var(--dim); letter-spacing: 0.3px; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; transition: all 0.15s; }
  .tab:hover { color: #e2e8f0; }
  .tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  /* Scatter */
  .scatter-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 24px; }
  .scatter-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
  .scatter-title { font-size: 13px; font-weight: 700; color: #f1f5f9; }
  .scatter-sub { font-size: 11px; color: var(--dim); margin-top: 3px; }

  .legend { display: flex; flex-wrap: wrap; gap: 12px; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 10px; color: #94a3b8; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  .legend-ring { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; background: transparent; }

  /* Phase grid */
  .phase-section { margin-bottom: 28px; }
  .phase-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding: 10px 14px; border-radius: 8px; }
  .phase-label { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
  .phase-sub { font-size: 10px; font-weight: 400; opacity: 0.7; margin-left: 4px; }
  .phase-count { font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 700; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; cursor: pointer; transition: all 0.15s; }
  .card:hover { border-color: var(--border2); background: var(--card2); }
  .card.selected { border-color: var(--blue); background: rgba(59,130,246,0.05); }

  .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .card-name { font-size: 14px; font-weight: 700; color: #f1f5f9; }
  .card-ticker { font-size: 10px; color: var(--dim); }
  .card-modality { font-size: 9px; font-weight: 600; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.3px; }

  .metrics-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: rgba(255,255,255,0.03); border-radius: 6px; padding: 8px 10px; }
  .metric-label { font-size: 9px; font-weight: 600; letter-spacing: 0.5px; color: var(--dim); text-transform: uppercase; margin-bottom: 4px; }
  .metric-val { font-size: 13px; font-weight: 700; line-height: 1.2; }
  .metric-sub { font-size: 9px; color: var(--dim); margin-top: 2px; }

  .physics-bar { height: 3px; border-radius: 2px; margin-top: 8px; }

  /* Detail panel */
  .detail { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 22px; margin-top: 16px; }
  .detail-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
  .detail-name { font-size: 18px; font-weight: 800; color: #f8fafc; }
  .detail-meta { font-size: 11px; color: var(--dim); margin-top: 3px; }
  .close-btn { padding: 5px 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 5px; color: var(--dim); font-size: 11px; cursor: pointer; font-family: inherit; }

  .detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 16px; }
  .detail-metric { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 14px; }
  .detail-metric-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; color: var(--dim); text-transform: uppercase; margin-bottom: 8px; }
  .detail-metric-val { font-size: 22px; font-weight: 800; margin-bottom: 4px; line-height: 1; }
  .detail-metric-type { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; display: inline-block; margin-bottom: 8px; }
  .detail-metric-note { font-size: 11px; color: #94a3b8; line-height: 1.5; }

  .expectations-box { background: rgba(245,158,11,0.05); border: 1px solid rgba(245,158,11,0.2); border-radius: 8px; padding: 12px 16px; margin-top: 14px; }
  .expectations-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; color: #f59e0b; text-transform: uppercase; margin-bottom: 4px; }
  .expectations-text { font-size: 12px; color: #fcd34d; line-height: 1.6; }

  /* Modality ref */
  .modality-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .mod-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .mod-name { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
  .mod-companies { font-size: 10px; color: var(--dim); margin-bottom: 10px; }
  .mod-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
  .mod-row-label { font-size: 10px; color: var(--dim); }
  .mod-row-val { font-size: 10px; font-weight: 600; color: #cbd5e1; }
  .mod-note { font-size: 10px; color: #64748b; line-height: 1.5; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }

  /* Confidence labels */
  .conf-demonstrated { background: rgba(16,185,129,0.15); color: #34d399; }
  .conf-target { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .conf-estimated { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .conf-theoretical { background: rgba(139,92,246,0.15); color: #a78bfa; }
  .conf-na { background: rgba(100,116,139,0.15); color: #94a3b8; }
  .conf-unknown { background: rgba(100,116,139,0.1); color: #64748b; }

  /* Modality Comparator */
  .mc-intro { font-size: 11px; color: #94a3b8; line-height: 1.6; margin-bottom: 20px; max-width: 900px; }
  .mc-intro strong { color: #e2e8f0; }
  .mc-unified-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  .mc-unified-label { font-size: 11px; font-weight: 700; color: #e2e8f0; width: 140px; flex-shrink: 0; }
  .mc-unified-track { flex: 1; height: 20px; background: rgba(255,255,255,0.03); border-radius: 4px; position: relative; overflow: hidden; }
  .mc-unified-fill { height: 100%; border-radius: 4px; transition: width 0.3s; display: flex; align-items: center; justify-content: flex-end; padding-right: 8px; font-size: 10px; font-weight: 700; min-width: 40px; }
  .mc-unified-score { font-size: 12px; font-weight: 800; width: 50px; text-align: right; flex-shrink: 0; }

  .mc-table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; overflow-x: auto; }
  .mc-table { width: 100%; border-collapse: collapse; font-size: 11px; }
  .mc-table th { text-align: left; padding: 8px 10px; font-size: 9px; font-weight: 700; letter-spacing: 0.6px; color: var(--dim); text-transform: uppercase; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .mc-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.03); vertical-align: middle; }
  .mc-table tr:hover td { background: rgba(255,255,255,0.02); }
  .mc-table input[type="range"] { width: 80px; height: 4px; accent-color: var(--blue); cursor: pointer; vertical-align: middle; }
  .mc-table .mc-score-cell { font-size: 13px; font-weight: 800; text-align: center; width: 40px; }
  .mc-table .mc-mod-name { font-weight: 700; color: #f1f5f9; white-space: nowrap; }
  .mc-table .mc-raw { font-size: 9px; color: var(--dim); display: block; margin-top: 2px; }

  .mc-param-header { display: flex; align-items: center; gap: 6px; }
  .mc-param-header .mc-info { font-size: 8px; color: var(--dim); font-weight: 400; letter-spacing: 0; text-transform: none; }

  .mc-radar-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .mc-radar-title { font-size: 13px; font-weight: 700; color: #f1f5f9; margin-bottom: 4px; }
  .mc-radar-sub { font-size: 10px; color: var(--dim); margin-bottom: 16px; }
  .mc-radar-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
  .mc-radar-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: #94a3b8; cursor: pointer; }
  .mc-radar-legend-item.disabled { opacity: 0.3; }
  .mc-radar-legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .mc-insight-box { background: rgba(59,130,246,0.05); border: 1px solid rgba(59,130,246,0.15); border-radius: 8px; padding: 14px 18px; margin-top: 16px; }
  .mc-insight-label { font-size: 10px; font-weight: 700; letter-spacing: 0.8px; color: var(--blue); text-transform: uppercase; margin-bottom: 6px; }
  .mc-insight-text { font-size: 11px; color: #94a3b8; line-height: 1.7; }
  .mc-insight-text strong { color: #e2e8f0; }

  .mc-weight-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .mc-weight-label { font-size: 10px; font-weight: 600; color: #94a3b8; width: 100px; }
  .mc-weight-val { font-size: 10px; font-weight: 700; color: #e2e8f0; width: 30px; text-align: right; }

  .mc-section { margin-bottom: 24px; }
  .mc-section-title { font-size: 12px; font-weight: 700; color: #f1f5f9; margin-bottom: 12px; letter-spacing: -0.2px; }

  /* QTUM ETF Tab */
  .qtum-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  .qtum-stat { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; }
  .qtum-stat-label { font-size: 9px; font-weight: 700; letter-spacing: 0.8px; color: var(--dim); text-transform: uppercase; margin-bottom: 6px; }
  .qtum-stat-val { font-size: 22px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .qtum-stat-sub { font-size: 10px; color: #64748b; line-height: 1.4; }
  .qtum-insight { background: rgba(239,68,68,0.05); border: 1px solid rgba(239,68,68,0.2); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; font-size: 11px; color: #fca5a5; line-height: 1.7; }
  .qtum-insight strong { color: #f87171; }
  .qtum-filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .qtum-filter-btn { padding: 5px 12px; font-size: 10px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; color: var(--dim); font-family: inherit; letter-spacing: 0.3px; transition: all 0.15s; }
  .qtum-filter-btn:hover { color: #e2e8f0; border-color: var(--border2); }
  .qtum-filter-btn.active { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.4); color: #60a5fa; }
  .qtum-tier-1 { background: rgba(16,185,129,0.15); color: #34d399; }
  .qtum-tier-2 { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .qtum-tier-3 { background: rgba(245,158,11,0.15); color: #fbbf24; }
  .qtum-tier-4 { background: rgba(239,68,68,0.15); color: #f87171; }
  .qtum-weight-under { background: rgba(6,182,212,0.15); color: #22d3ee; }
  .qtum-weight-ok    { background: rgba(16,185,129,0.12); color: #6ee7b7; }
  .qtum-weight-over  { background: rgba(245,158,11,0.12); color: #fcd34d; }
  .qtum-weight-out   { background: rgba(239,68,68,0.12); color: #fca5a5; }
  .qtum-table td { vertical-align: top; }
  .qtum-note { font-size: 10px; color: #64748b; line-height: 1.5; max-width: 340px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Nav dropdowns */
  .nav-wrap { display: flex; gap: 10px; margin-bottom: 22px; align-items: center; flex-wrap: wrap; }
  .nav-group { position: relative; }
  .nav-btn { display: flex; align-items: center; gap: 5px; padding: 7px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 7px; color: #94a3b8; font-size: 11px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.15s; white-space: nowrap; }
  .nav-btn:hover { color: #e2e8f0; border-color: var(--border2); }
  .nav-btn.nav-active { border-color: var(--blue); background: rgba(59,130,246,0.06); color: #f1f5f9; }
  .nav-btn-group { font-size: 8px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase; color: var(--dim); }
  .nav-sep { color: rgba(255,255,255,0.12); font-size: 10px; }
  .nav-btn-cur { font-size: 11px; font-weight: 700; color: inherit; }
  .nav-btn-caret { font-size: 8px; color: var(--dim); margin-left: 2px; }
  .nav-dropdown { position: absolute; top: calc(100% + 6px); left: 0; min-width: 190px; background: #111827; border: 1px solid var(--border2); border-radius: 8px; padding: 4px; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  .nav-item { display: block; width: 100%; text-align: left; padding: 7px 12px; font-size: 11px; font-weight: 600; color: #94a3b8; background: none; border: none; cursor: pointer; font-family: inherit; border-radius: 5px; transition: all 0.1s; letter-spacing: 0.2px; }
  .nav-item:hover { background: rgba(255,255,255,0.05); color: #e2e8f0; }
  .nav-item.nav-item-active { background: rgba(59,130,246,0.12); color: #60a5fa; }

  @media (max-width: 900px) {
    .detail-grid { grid-template-columns: 1fr 1fr; }
    .modality-grid { grid-template-columns: 1fr 1fr; }
    .invest-cards { grid-template-columns: 1fr; }
    .header { flex-direction: column; gap: 12px; align-items: flex-start; }
    .header > div:last-child { align-items: flex-start !important; }
    .tabs { overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    .tab { white-space: nowrap; flex-shrink: 0; }
    .qtum-summary { grid-template-columns: 1fr 1fr; }
    .cards { grid-template-columns: 1fr; }
    .mc-table-wrap { overflow-x: auto; }
    .scatter-header { flex-direction: column; gap: 12px; }
  }
  @media (max-width: 600px) {
    .detail-grid { grid-template-columns: 1fr; }
    .metrics-row { grid-template-columns: 1fr 1fr; }
    .modality-grid { grid-template-columns: 1fr; }
    .qtum-summary { grid-template-columns: 1fr; }
    .wrap { padding: 12px 14px; }
  }

  /* Investability Tab */
  .invest-header { margin-bottom: 20px; }
  .invest-dim-strip { display: flex; gap: 24px; margin-bottom: 20px; flex-wrap: wrap; padding: 12px 16px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px solid var(--border); }
  .invest-dim-strip-item { }
  .invest-dim-label { font-size: 11px; font-weight: 700; color: #f1f5f9; margin-bottom: 2px; }
  .invest-dim-desc { font-size: 10px; color: #475569; }

  .invest-filters { display: flex; gap: 6px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
  .invest-filter-btn { padding: 5px 12px; font-size: 10px; font-weight: 600; cursor: pointer; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 4px; color: var(--dim); font-family: inherit; letter-spacing: 0.3px; transition: all 0.15s; }
  .invest-filter-btn:hover { color: #e2e8f0; border-color: var(--border2); }
  .invest-filter-btn.active { background: rgba(59,130,246,0.12); border-color: rgba(59,130,246,0.4); color: #60a5fa; }
  .invest-sort-label { font-size: 10px; color: var(--dim); margin-left: 10px; }

  .invest-section { margin-bottom: 28px; }
  .invest-section-header { font-size: 10px; font-weight: 700; letter-spacing: 0.6px; color: #64748b; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

  .invest-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 12px; }
  .invest-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: all 0.15s; }
  .invest-card:hover { border-color: var(--border2); background: var(--card2); }
  .invest-card-head { padding: 12px 14px 10px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .invest-card-name { font-size: 13px; font-weight: 700; color: #f1f5f9; margin-bottom: 2px; }
  .invest-card-ticker { font-size: 10px; color: var(--dim); }
  .invest-dims { display: grid; grid-template-columns: 1fr 1fr; }
  .invest-dim-cell { padding: 10px 12px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .invest-dim-cell:nth-child(2n) { border-right: none; }
  .invest-dim-cell:nth-last-child(-n+2) { border-bottom: none; }
  .invest-dim-cell-label { font-size: 9px; font-weight: 700; letter-spacing: 0.6px; color: var(--dim); text-transform: uppercase; margin-bottom: 5px; }
  .invest-dim-cell-rating { margin-bottom: 4px; }
  .invest-dim-cell-note { font-size: 10px; color: #94a3b8; line-height: 1.5; }
  .rating-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: 0.4px; }
  .private-badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 3px; font-size: 9px; font-weight: 700; letter-spacing: 0.4px; background: rgba(100,116,139,0.15); color: #94a3b8; }

  /* Modality Explanation animations */
  .mod-anim-wrap { width: 100%; height: 72px; margin-bottom: 10px; position: relative; overflow: hidden; border-radius: 6px; background: rgba(0,0,0,0.25); }
  .mod-fidelity-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .mod-fidelity-label { font-size: 9px; font-weight: 700; letter-spacing: 0.5px; color: #475569; text-transform: uppercase; flex-shrink: 0; }
  .mod-fidelity-track { flex: 1; height: 6px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
  .mod-fidelity-fill { height: 100%; border-radius: 3px; }
  .mod-fidelity-pct { font-size: 10px; font-weight: 700; flex-shrink: 0; width: 40px; text-align: right; }
  .mod-na-badge { font-size: 9px; font-weight: 700; color: #475569; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 10px; }

  @keyframes ion-osc { 0%,100%{transform:translateX(0)} 50%{transform:translateX(3px)} }
  @keyframes ion-osc2 { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-3px)} }
  @keyframes phonon-wave { 0%{opacity:0;stroke-dashoffset:60} 30%{opacity:1} 70%{opacity:1} 100%{opacity:0;stroke-dashoffset:0} }
  @keyframes gate-glow { 0%,60%,100%{opacity:0.35} 70%,90%{opacity:1} }
  @keyframes alltoall-glow { 0%,65%,100%{opacity:0.15} 75%,88%{opacity:0.7} }

  @keyframes rydberg-expand { 0%,100%{r:5;opacity:0} 30%,70%{r:22;opacity:0.18} }
  @keyframes atom-gate-pulse { 0%,55%,100%{opacity:0} 65%,85%{opacity:1} }
  @keyframes atom-move { 0%,100%{cx:24} 45%,55%{cx:34} }

  @keyframes sc-pulse-travel { 0%{stroke-dashoffset:80;opacity:0} 10%{opacity:1} 80%{stroke-dashoffset:0;opacity:1} 90%,100%{opacity:0} }
  @keyframes sc-error-flicker { 0%,85%,100%{opacity:0} 88%,96%{opacity:0.5} }
  @keyframes sc-idle-osc { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

  @keyframes catwell-hop { 0%,100%{transform:translateX(0)} 40%,60%{transform:translateX(18px)} }
  @keyframes catwell-phase-err { 0%,88%,100%{opacity:0} 92%,97%{opacity:0.8} }

  @keyframes photon-travel { 0%{transform:translateX(-70px);opacity:0} 15%{opacity:1} 55%{transform:translateX(0);opacity:1} 65%,100%{transform:translateX(0);opacity:0} }

// Live Yahoo Finance market cap fetch (15-min cache via localStorage)
async function fetchYahooMarketCap(ticker) {
  const cacheKey = `qi_cap_${ticker}`;
  try {
    const cached = JSON.parse(localStorage.getItem(cacheKey) || 'null');
    if (cached && Date.now() - cached.ts < 15 * 60 * 1000) return { capB: cached.capB, live: true };
  } catch(e) {}
  try {
    const res = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`, {
      headers: { 'Accept': 'application/json', 'User-Agent': 'Mozilla/5.0' },
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const meta = data?.chart?.result?.[0]?.meta;
    const capB = meta?.marketCap ? meta.marketCap / 1e9 : null;
    if (capB) localStorage.setItem(cacheKey, JSON.stringify({ capB, ts: Date.now() }));
    return { capB, live: !!capB };
  } catch(e) {
    return { capB: null, live: false };
  }
}

/* ─── SCATTER PLOT ─────────────────────────────────────── */

function ScatterPlot({ companies, selected, onSelect }) {
  const W = 860, H = 420;
  const ml = 72, mr = 24, mt = 20, mb = 60;
  const pw = W - ml - mr, ph = H - mt - mb;

  // X: 0=physics proving → 4=commercial
  // Y: log ratio, lower (better) = top
  const xScale = x => (x / 4) * pw;
  const yScale = r => {
    if (!r) return null;
    const logVal = Math.log10(r);
    const logMin = 0, logMax = 7;
    return ((logVal - logMin) / (logMax - logMin)) * ph;
  };

  const noRatioCompanies = companies.filter(c => !c.logicalRatio || c.ratioType === 'na');
  const ratioCompanies = companies.filter(c => c.logicalRatio && c.ratioType !== 'na');

  const yTicks = [1, 10, 100, 1000, 100000, 10000000];
  const yLabels = ['1:1', '10:1', '100:1', '1K:1', '100K:1', '10M:1'];

  const xZones = [
    { x0: 0, x1: 1.0, label: 'Physics Proving', color: 'rgba(245,158,11,0.04)' },
    { x0: 1.0, x1: 3.0, label: 'Engineering Execution', color: 'rgba(16,185,129,0.04)' },
    { x0: 3.0, x1: 4.0, label: 'Commercial', color: 'rgba(59,130,246,0.04)' },
  ];

  const ratioTypeStyle = (t) => ({
    demonstrated: { fill: '#10b981', stroke: '#10b981', opacity: 1 },
    target:       { fill: '#3b82f6', stroke: '#3b82f6', opacity: 0.9 },
    estimated:    { fill: 'none',    stroke: '#f59e0b', opacity: 1 },
    theoretical:  { fill: 'none',    stroke: '#8b5cf6', opacity: 1 },
    unknown:      { fill: 'none',    stroke: '#475569', opacity: 0.6 },
    na:           { fill: '#475569', stroke: '#475569', opacity: 0.4 },
  })[t] || { fill: '#475569', stroke: '#475569', opacity: 0.6 };

  return (
    <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ overflow: 'visible' }}>
      {/* Zone backgrounds */}
      {xZones.map((z, i) => (
        <rect key={i}
          x={ml + xScale(z.x0)} y={mt}
          width={xScale(z.x1) - xScale(z.x0)} height={ph}
          fill={z.color}
        />
      ))}

      {/* Zone borders */}
      {[1.0, 3.0].map((x, i) => (
        <line key={i}
          x1={ml + xScale(x)} y1={mt}
          x2={ml + xScale(x)} y2={mt + ph}
          stroke="rgba(255,255,255,0.06)" strokeWidth={1} strokeDasharray="4 4"
        />
      ))}

      {/* Zone labels */}
      {xZones.map((z, i) => (
        <text key={i}
          x={ml + xScale((z.x0 + z.x1) / 2)} y={mt + ph + 36}
          textAnchor="middle" fontSize={10} fill="#475569" fontFamily="SF Mono, monospace">
          {z.label}
        </text>
      ))}

      {/* Y grid + labels */}
      {yTicks.map((r, i) => {
        const y = mt + yScale(r);
        return (
          <g key={i}>
            <line x1={ml} y1={y} x2={ml + pw} y2={y} stroke="rgba(255,255,255,0.04)" strokeWidth={1} />
            <text x={ml - 8} y={y + 4} textAnchor="end" fontSize={9} fill="#475569" fontFamily="SF Mono, monospace">
              {yLabels[i]}
            </text>
          </g>
        );
      })}

      {/* Y axis label */}
      <text transform={`translate(14, ${mt + ph/2}) rotate(-90)`}
        textAnchor="middle" fontSize={9} fill="#475569" fontFamily="SF Mono, monospace">
        Physical → Logical Ratio (lower = better)
      </text>

      {/* Axes */}
      <line x1={ml} y1={mt} x2={ml} y2={mt + ph + 4} stroke="#1a2640" strokeWidth={1} />
      <line x1={ml} y1={mt + ph} x2={ml + pw} y2={mt + ph} stroke="#1a2640" strokeWidth={1} />

      {/* No-ratio band */}
      <rect x={ml} y={mt + ph - 28} width={pw} height={26}
        fill="rgba(255,255,255,0.015)" stroke="none" />
      <text x={ml + 6} y={mt + ph - 14} fontSize={8} fill="#2d3748" fontFamily="SF Mono, monospace">
        No ratio data (infrastructure / annealing / undemonstrated)
      </text>

      {/* No-ratio companies */}
      {noRatioCompanies.map((c, i) => {
        const cx = ml + xScale(c.phaseX);
        const cy = mt + ph - 14;
        const r = 7;
        const style = ratioTypeStyle(c.ratioType);
        const sel = selected?.id === c.id;
        return (
          <g key={c.id} onClick={() => onSelect(c)} style={{ cursor: 'pointer' }}>
            <circle cx={cx} cy={cy} r={sel ? r + 3 : r}
              fill={style.fill === 'none' ? 'transparent' : SCALING_COLORS[c.scalingPath]}
              stroke={sel ? '#fff' : SCALING_COLORS[c.scalingPath]}
              strokeWidth={style.fill === 'none' ? 2 : 1}
              opacity={style.opacity}
            />
            <text x={cx} y={cy - 11} textAnchor="middle" fontSize={8} fill="#64748b" fontFamily="SF Mono, monospace">
              {c.name}
            </text>
          </g>
        );
      })}

      {/* Ratio companies */}
      {ratioCompanies.map((c) => {
        const cx = ml + xScale(c.phaseX);
        const cy = mt + yScale(c.logicalRatio);
        const r = 8;
        const style = ratioTypeStyle(c.ratioType);
        const sel = selected?.id === c.id;
        const col = SCALING_COLORS[c.scalingPath];
        const isFilled = style.fill !== 'none';
        return (
          <g key={c.id} onClick={() => onSelect(c)} style={{ cursor: 'pointer' }}>
            {sel && <circle cx={cx} cy={cy} r={r + 5} fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.2)" strokeWidth={1} />}
            <circle cx={cx} cy={cy} r={r}
              fill={isFilled ? col : 'transparent'}
              stroke={col}
              strokeWidth={isFilled ? 1 : 2.5}
              opacity={style.opacity}
            />
            <text x={cx} y={cy - 13} textAnchor="middle" fontSize={8} fill={sel ? '#e2e8f0' : '#64748b'} fontFamily="SF Mono, monospace" fontWeight={sel ? '700' : '400'}>
              {c.name}
            </text>
            {c.ratioType === 'demonstrated' && (
              <text x={cx + 11} y={cy + 4} fontSize={7} fill="#10b981" fontFamily="SF Mono, monospace">★</text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

function PhotonicAnim({ color }) {
  const [tick, setTick] = React.useState(0);
  React.useEffect(() => {
    const id = setInterval(() => setTick(t => (t + 1) % 100), 60);
    return () => clearInterval(id);
  }, []);
  // Every 3 cycles (~18s of ticks), fail once
  const cyclePos = tick % 100;
  const isFail = tick % 300 < 100 && cyclePos > 55 && cyclePos < 75;
  return (
    <svg viewBox="0 0 160 72" width="100%" height="72" style={{display:'block'}}>
      {/* Input waveguide */}
      <line x1="0" y1="36" x2="72" y2="36" stroke="#1e293b" strokeWidth="1.5"/>

      <rect x="68" y="28" width="8" height="16" rx="2" fill="#334155" stroke="#475569" strokeWidth="1"/>
      <text x="72" y="24" textAnchor="middle" fontSize="7" fill="#64748b">BS</text>

      <line x1="76" y1="36" x2="148" y2="18" stroke="#1e293b" strokeWidth="1.5"/>
      <line x1="76" y1="36" x2="148" y2="54" stroke="#1e293b" strokeWidth="1.5"/>
      {/* Traveling photon */}
      <circle cx="36" cy="36" r="4" fill={color} opacity="0"
        style={{animation:'photon-travel 3s ease-in-out infinite'}}/>
      {/* Exit photon A (success upper) */}
      {!isFail && <circle cx="76" cy="36" r="4" fill={color} opacity="0"
        style={{animation:'photon-exit-a 3s ease-in-out infinite'}}/>}
      {/* Exit photon B (success lower) */}
      {!isFail && <circle cx="76" cy="36" r="4" fill={color} opacity="0"
        style={{animation:'photon-exit-b 3s ease-in-out infinite 0.05s'}}/>}
      {/* Fail flash */}
      <rect x="60" y="28" width="24" height="16" rx="3" fill="#ef4444" opacity={isFail ? 0.5 : 0}/>

  );
}

function InvestabilityTab({ companies }) {
  const [filter, setFilter] = React.useState('all');
  const [sort, setSort] = React.useState('phase');

  const filterFn = (c) => {
    if (filter === 'all') return true;
    if (filter === 'public') return c.ticker !== 'Private' && c.ticker !== 'Pre-IPO' && c.ticker !== 'Acquired (QBTS)' && !c.ticker.startsWith('Acquired');
    if (filter === 'preipo') return c.ticker === 'Pre-IPO';
    if (filter === 'private') return c.ticker === 'Private';
    return true;
  };

  const sortFn = (a, b) => {
    const moatOrder = { Strong: 0, Moderate: 1, Weak: 2, None: 3 };
    const potOrder = { Exceptional: 0, Strong: 1, Moderate: 2, Weak: 3 };
    const comOrder = { Clear: 0, Developing: 1, Unclear: 2 };
    const phaseOrder = { commercial: 0, engineering: 1, proving: 2 };
    if (sort === 'phase') return (phaseOrder[a.phase] ?? 3) - (phaseOrder[b.phase] ?? 3);
    if (sort === 'moat') return (moatOrder[a.moatCurrent] ?? 4) - (moatOrder[b.moatCurrent] ?? 4);
    if (sort === 'potential') return (potOrder[a.moatPotential] ?? 4) - (potOrder[b.moatPotential] ?? 4);
    if (sort === 'commerce') return (comOrder[a.commerceRating] ?? 4) - (comOrder[b.commerceRating] ?? 4);
    return 0;
  };

  const filtered = companies.filter(filterFn);

  const publicPure = filtered.filter(c => !c.contextTier && c.ticker !== 'Private' && c.ticker !== 'Pre-IPO' && !c.ticker.startsWith('Acquired') && c.ticker !== 'Public' || (!c.contextTier && (c.ticker === 'IONQ' || c.ticker === 'RGTI' || c.ticker === 'QBTS'))).sort(sortFn);
  const contextTier = filtered.filter(c => c.contextTier).sort(sortFn);
  const preipo = filtered.filter(c => c.ticker === 'Pre-IPO').sort(sortFn);
  const privatecos = filtered.filter(c => c.ticker === 'Private').sort(sortFn);
  const publicNonPure = filtered.filter(c => !c.contextTier && c.ticker === 'Public').sort(sortFn);
  const acquired = filtered.filter(c => c.ticker.startsWith('Acquired')).sort(sortFn);

  // Simpler grouping
  const pubPure2 = filtered.filter(c => ['IONQ','RGTI','QBTS'].includes(c.ticker)).sort(sortFn);
  const ctx2 = filtered.filter(c => c.contextTier).sort(sortFn);
  const pre2 = filtered.filter(c => c.ticker === 'Pre-IPO').sort(sortFn);
  const pub2 = filtered.filter(c => c.ticker === 'Public' && !c.contextTier).sort(sortFn);
  const priv2 = filtered.filter(c => c.ticker === 'Private').sort(sortFn);
  const acq2 = filtered.filter(c => c.ticker.startsWith('Acquired')).sort(sortFn);

  const sections = [
    { title: 'Public Pure-Plays', companies: pubPure2 },
    { title: 'Context Tier — Big Tech', companies: ctx2 },
    { title: 'Pre-IPO', companies: pre2 },
    { title: 'Effectively Public', companies: pub2 },
    { title: 'Private', companies: priv2 },
    { title: 'Acquired / Inactive', companies: acq2 },
  ].filter(s => s.companies.length > 0);

  return (
    <div>
      <div className="invest-header">
        <div style={{ fontSize: 13, fontWeight: 700, color: '#f1f5f9', marginBottom: 4 }}>Investability Framework</div>
        <div style={{ fontSize: 11, color: '#475569', marginBottom: 16 }}>Four dimensions: current moat, moat potential, commercialization clarity, valuation.</div>
        <div className="invest-dim-strip">
          {[
            { label: 'Current Moat', desc: 'Defensibility today — pricing power, switching costs, barriers' },
            { label: 'Moat Potential', desc: 'How wide the moat could be at scale — trajectory matters' },
            { label: 'Commercialization', desc: 'Revenue clarity: Clear = today, Developing = path, Unclear = open question' },
            { label: 'Valuation', desc: 'Public only. Private = funding context only.' },
          ].map(d => (
            <div className="invest-dim-strip-item" key={d.label}>
              <div className="invest-dim-label">{d.label}</div>
              <div className="invest-dim-desc">{d.desc}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="invest-filters">
        {[['all','All'],['public','Public'],['preipo','Pre-IPO'],['private','Private']].map(([id, label]) => (
          <button key={id} className={`invest-filter-btn ${filter === id ? 'active' : ''}`} onClick={() => setFilter(id)}>{label}</button>
        ))}
        <span className="invest-sort-label">Sort:</span>
        {[['phase','Phase'],['moat','Current Moat'],['potential','Moat Potential'],['commerce','Commerce']].map(([id, label]) => (
          <button key={id} className={`invest-filter-btn ${sort === id ? 'active' : ''}`} onClick={() => setSort(id)}>{label}</button>
        ))}
      </div>

      {sections.map(s => (
        <div className="invest-section" key={s.title}>
          <div className="invest-section-header">{s.title} <span style={{ color: '#2d3748', marginLeft: 6 }}>({s.companies.length})</span></div>
          <div className="invest-cards">
            {s.companies.map(c => <InvestCard key={c.id} c={c} />)}
          </div>
        </div>
      ))}
    </div>
  );
}

function ModalityComparator() {
  // 3-Layer parameter structure
  const layers = [
    { id: 'physics', label: 'Layer 1: Physics', color: '#60a5fa',
      params: ['quality', 'speed', 'connectivity', 'coherence'] },
    { id: 'systems', label: 'Layer 2: Systems', color: '#a78bfa',
      params: ['qecEfficiency', 'controlComplexity', 'hpcIntegration', 'calibrationStability'] },
    { id: 'commercial', label: 'Layer 3: Commercial', color: '#34d399',
      params: ['mfgScalability', 'thermalBurden', 'revenueTraction'] },
  ];
  const allParams = layers.flatMap(l => l.params);

  const paramLabels = {
    quality: 'Fidelity', speed: 'Gate Speed', connectivity: 'Connectivity', coherence: 'Coherence',
    qecEfficiency: 'QEC Efficiency', controlComplexity: 'Control', hpcIntegration: 'HPC Integration',
    calibrationStability: 'Qubit Uniformity',
    mfgScalability: 'Mfg Scale', thermalBurden: 'Thermal', revenueTraction: 'Revenue',
  };
  const paramInfo = {
    quality: 'Gate fidelity / error rates',
    speed: 'Gate clock speed (ns → μs) — gate speed ≠ algorithmic throughput',
    connectivity: 'Qubit interaction topology & photonic scaling path',
    coherence: 'Decoherence time (T1/T2)',
    qecEfficiency: 'Physical-to-logical qubit ratio',
    controlComplexity: 'Control stack maturity & calibration overhead',
    hpcIntegration: 'Classical HPC integration readiness',
    calibrationStability: 'Natural (identical) vs synthetic (drift) — calibration scales nonlinearly',
    mfgScalability: 'Manufacturing path & cost curve',
    thermalBurden: 'Cooling requirements & footprint',
    revenueTraction: 'Revenue growth & market validation',
  };

  // Layer-aware weights: Physics=dominant, Systems=constraints, Commercial=tie-breakers
  const [weights, setWeights] = React.useState(DEFAULT_WEIGHTS);
  React.useEffect(() => {
    const saved = localStorage.getItem('qci-modality-weights');
    if (saved) { try { setWeights(JSON.parse(saved)); } catch(e) {} }
  }, []);
  React.useEffect(() => {
    localStorage.setItem('qci-modality-weights', JSON.stringify(weights));
  }, [weights]);
  const handleExport = () => {
    const blob = new Blob([JSON.stringify({ weights }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'qci-config.json'; a.click();
    URL.revokeObjectURL(url);
  };
  const handleImport = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.weights) { setWeights(data.weights); localStorage.setItem('qci-modality-weights', JSON.stringify(data.weights)); }
      } catch(err) {}
    };
    reader.readAsText(file);
    e.target.value = '';
  };
  const handleReset = () => { setWeights(DEFAULT_WEIGHTS); localStorage.removeItem('qci-modality-weights'); };

  const [scores, setScores] = React.useState(() =>
    DEFAULT_MODALITY_SCORES.map(m => {
      const copy = { name: m.name };
      allParams.forEach(p => { copy[p] = { ...m[p] }; });
      return copy;
    })
  );
  const [hiddenMods, setHiddenMods] = React.useState({});
  const [expandedLayer, setExpandedLayer] = React.useState('physics');

  const updateScore = (modIdx, param, val) => {
    setScores(prev => {
      const next = prev.map(m => {
        const copy = { name: m.name };
        allParams.forEach(p => { copy[p] = { ...m[p] }; });
        return copy;
      });
      next[modIdx][param].score = val;
      return next;
    });
  };

  // Weighted geometric mean — one bad param drags everything down
  const computeUnified = (mod) => {
    const totalWeight = allParams.reduce((s, p) => s + weights[p], 0);
    const logSum = allParams.reduce((s, p) => s + weights[p] * Math.log(mod[p].score || 0.1), 0);
    return Math.exp(logSum / totalWeight);
  };

  // Layer sub-scores for breakdown
  const computeLayerScore = (mod, layer) => {
    const ps = layer.params;
    const totalW = ps.reduce((s, p) => s + weights[p], 0);
    const logSum = ps.reduce((s, p) => s + weights[p] * Math.log(mod[p].score || 0.1), 0);
    return Math.exp(logSum / totalW);
  };

  const ranked = scores
    .map((m, i) => ({ ...m, idx: i, unified: computeUnified(m) }))
    .sort((a, b) => b.unified - a.unified);

  // Radar chart (SVG) — 10 axes
  const radarSize = 400;
  const radarCenter = radarSize / 2;
  const radarRadius = radarSize / 2 - 50;
  const angleStep = (2 * Math.PI) / allParams.length;

  const radarPoint = (paramIdx, value) => {
    const angle = angleStep * paramIdx - Math.PI / 2;
    const r = (value / 10) * radarRadius;
    return [radarCenter + r * Math.cos(angle), radarCenter + r * Math.sin(angle)];
  };

  const toggleMod = (name) => {
    setHiddenMods(prev => ({ ...prev, [name]: !prev[name] }));
  };

  // Find which layer a param belongs to (for color coding axis labels)
  const getLayerForParam = (p) => layers.find(l => l.params.includes(p));

  // Insight generation
  const generateInsights = () => {
    const top = ranked[0];
    const runner = ranked[1];
    const insights = [];

    insights.push(`<strong>${top.name}</strong> leads with a unified score of <strong>${top.unified.toFixed(2)}</strong> — ${((top.unified / runner.unified - 1) * 100).toFixed(0)}% ahead of ${runner.name}.`);

    // Monroe: architecture vs gate speed principle
    const tiMod = scores.find(m => m.name === 'Trapped Ion');
    const scMod = scores.find(m => m.name === 'Superconducting');
    if (tiMod && scMod && tiMod.connectivity.score >= 8 && tiMod.speed.score <= 4 && scMod.speed.score >= 9) {
      insights.push('<strong>Architecture vs. Gate Speed (Monroe Principle):</strong> Trapped Ion\'s gate speed (3/10) vs SC\'s (10/10) looks like a fatal gap — but Monroe: "architectural time-to-solution is not necessarily slow" and "this is what people miss." Full all-to-all connectivity eliminates SWAP chains and reduces QEC overhead. A 1 kHz gate needing 10 ops beats a 100 MHz gate needing 10,000 ops for the same logical step. Time-to-solution at the algorithm level favors connectivity over clock speed.');
    }

    // Monroe: natural vs synthetic qubit taxonomy
    const naturalMods = scores.filter(m => m.calibrationStability && m.calibrationStability.score >= 9);
    const syntheticMods = scores.filter(m => m.calibrationStability && m.calibrationStability.score <= 5);
    if (naturalMods.length > 0 && syntheticMods.length > 0) {
      insights.push(`<strong>Natural vs. Synthetic Qubit Divide (Monroe):</strong> ${naturalMods.map(m => m.name).join(', ')} score 9-10 on Qubit Uniformity — physics gives identity for free. ${syntheticMods.map(m => m.name).join(', ')} score ≤5 — synthetic qubits drift over time and calibration scales worse than linearly with qubit count. This is a physics problem wearing engineering clothes, not solvable by better fab processes alone.`);
    }

    // SC calibration drift structural warning
    if (scMod && scMod.calibrationStability && scMod.calibrationStability.score <= 4) {
      insights.push('<strong>Superconducting Industrialization Problem:</strong> Monroe identifies the structural flaw competitors miss — calibration interdependencies grow super-linearly with qubit count. IBM recognized this (pivoted to modular qLDPC). Rigetti has not. The scaling cost variable (k) for SC is increasing, not deflationary. qLDPC is an algorithmic fix that doesn\'t solve the underlying qubit physics.');
    }

    // Layer-level breakdown for top 3
    ranked.slice(0, 3).forEach(m => {
      const layerScores = layers.map(l => `${l.label.split(':')[1].trim()}: ${computeLayerScore(m, l).toFixed(1)}`);
      insights.push(`<strong>${m.name}</strong> layer breakdown — ${layerScores.join(' · ')}`);
    });

    // Find strongest parameter per modality
    const paramWinners = {};
    allParams.forEach(p => {
      const best = scores.reduce((a, b) => (a[p].score > b[p].score ? a : b));
      paramWinners[p] = best.name;
    });
    const uniqueWinners = [...new Set(Object.values(paramWinners))];
    if (uniqueWinners.length > 2) {
      const parts = allParams.map(p => `${paramLabels[p]}: <strong>${paramWinners[p]}</strong>`);
      insights.push('Parameter leaders — ' + parts.join(' · '));
    }

    // Fatal flaw detection (any score ≤ 2 is a structural blocker)
    scores.forEach(m => {
      const flaws = allParams.filter(p => m[p].score <= 2);
      if (flaws.length >= 2) {
        insights.push(`<strong>${m.name}</strong> has ${flaws.length} fatal flaws (≤2): ${flaws.map(p => paramLabels[p]).join(', ')}. These structurally limit commercialization regardless of strengths elsewhere.`);
      }
    });

    // Commercial readiness gap
    const commercialParams = layers[2].params;
    scores.forEach(m => {
      const physAvg = layers[0].params.reduce((s, p) => s + m[p].score, 0) / layers[0].params.length;
      const commAvg = commercialParams.reduce((s, p) => s + m[p].score, 0) / commercialParams.length;
      if (physAvg - commAvg >= 4) {
        insights.push(`<strong>${m.name}</strong>: Physics (avg ${physAvg.toFixed(1)}) far ahead of Commercial (avg ${commAvg.toFixed(1)}). Strong science, weak business case — high execution risk.`);
      }
    });

    insights.push('Unified score = weighted geometric mean across all 3 layers. Hierarchy: <strong>Physics</strong> (dominant) → <strong>Systems</strong> (constraints) → <strong>Commercial</strong> (tie-breakers). One fatal flaw in any layer drags the entire score. Formula: Cost per Useful Computation ∝ (cost/physical qubit) × (physical-to-logical ratio) × (time/logical op). Scores are set at the <em>demonstrated point on each cost curve</em> — not the projected endpoint. A modality that has walked its curve gets credit. One that has only drawn the line forward does not. Quantinuum\'s 2:1 ratio is a data point on a curve Monroe walked for 17 years. PsiQuantum\'s 1M:1 overhead has no data points — the cost curve exists only on paper.');

    return insights;
  };

  return (
    <div>
      <div className="mc-intro">
        <strong>3-Layer Commercialization Framework.</strong> Ranks quantum modalities by <strong>cost per useful quantum computation</strong> — the only metric that collapses every tradeoff into one investable question. Formula: <span style={{ color: '#f59e0b' }}>(cost/physical qubit) × (physical-to-logical ratio) × (time/logical op)</span>. One catastrophic term dominates total cost regardless of how good the others are — hence weighted geometric mean, not arithmetic.
        <br/><br/>
        <span style={{ color: '#60a5fa' }}>Layer 1 (Physics)</span>: gate fidelity, speed, connectivity, coherence. <span style={{ color: '#a78bfa' }}>Layer 2 (Systems)</span>: QEC overhead, control complexity, HPC integration, <strong>qubit uniformity</strong> (natural vs. synthetic). <span style={{ color: '#34d399' }}>Layer 3 (Commercial)</span>: manufacturing, thermal burden, revenue traction. Scores are set at the <strong>demonstrated point on each cost curve</strong>, not the projected endpoint. Every modality promises cost reductions at scale — what separates them is how much of that curve has actually been walked. A 2:1 ratio with published data (Quantinuum) is priced differently than a 1:1 promise with no gate operations (topological).
      </div>

      {/* Config toolbar */}
      <div style={{ display: 'flex', gap: 8, alignItems: 'center', marginBottom: 16, flexWrap: 'wrap' }}>
        <button onClick={handleExport} className="qtum-filter-btn">↓ Export Config</button>
        <label className="qtum-filter-btn" style={{ cursor: 'pointer' }}>
          ↑ Import Config<input type="file" accept=".json" onChange={handleImport} style={{ display: 'none' }} />
        </label>
        <button onClick={handleReset} style={{ marginLeft: 'auto' }} className="qtum-filter-btn">Reset to Defaults</button>
      </div>

      {/* Radar Chart — 10 axes */}
      <div className="mc-radar-wrap">
        <div className="mc-radar-title">11-Axis Parameter Profile</div>
        <div className="mc-radar-sub">Each axis scored 1–10. Shape area ≈ system capability across physics, systems, and commercial layers. Qubit Uniformity axis (Layer 2) separates natural qubits (ions, atoms) from synthetic (SC, silicon spin) — Monroe's hidden variable.</div>
        <div style={{ display: 'flex', gap: 24, flexWrap: 'wrap', alignItems: 'flex-start' }}>
          <svg style={{ width: '100%', maxWidth: radarSize, height: 'auto' }} viewBox={`0 0 ${radarSize} ${radarSize}`}>
            {/* Grid rings */}
            {[2, 4, 6, 8, 10].map(v => (
              <polygon key={v}
                points={allParams.map((_, i) => radarPoint(i, v).join(',')).join(' ')}
                fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={1}
              />
            ))}
            {/* Axis lines — colored by layer */}
            {allParams.map((p, i) => {
              const [x, y] = radarPoint(i, 10);
              const layer = getLayerForParam(p);
              return <line key={p} x1={radarCenter} y1={radarCenter} x2={x} y2={y} stroke={layer.color + '30'} strokeWidth={1} />;
            })}
            {/* Axis labels — colored by layer */}
            {allParams.map((p, i) => {
              const [x, y] = radarPoint(i, 12.2);
              const layer = getLayerForParam(p);
              return <text key={p} x={x} y={y} textAnchor="middle" dominantBaseline="middle" fontSize={7} fontWeight={700} fill={layer.color} fontFamily="SF Mono, monospace">{paramLabels[p]}</text>;
            })}
            {/* Scale labels */}
            {[2, 4, 6, 8, 10].map(v => {
              const [x, y] = radarPoint(0, v);
              return <text key={v} x={x + 8} y={y} fontSize={7} fill="#2d3748" fontFamily="SF Mono, monospace">{v}</text>;
            })}
            {/* Modality polygons */}
            {scores.map(m => {
              if (hiddenMods[m.name]) return null;
              const color = MODALITY_COLORS[m.name] || '#94a3b8';
              return (
                <polygon key={m.name}
                  points={allParams.map((p, i) => radarPoint(i, m[p].score).join(',')).join(' ')}
                  fill={color + '12'} stroke={color} strokeWidth={1.5}
                />
              );
            })}
            {/* Modality dots */}
            {scores.map(m => {
              if (hiddenMods[m.name]) return null;
              const color = MODALITY_COLORS[m.name] || '#94a3b8';
              return allParams.map((p, i) => {
                const [x, y] = radarPoint(i, m[p].score);
                return <circle key={m.name + p} cx={x} cy={y} r={2.5} fill={color} stroke="#0f1623" strokeWidth={1} />;
              });
            })}
          </svg>

          <div style={{ flex: 1, minWidth: 260 }}>
            {/* Weight controls grouped by layer */}
            {layers.map(layer => (
              <div className="mc-section" key={layer.id}>
                <div className="mc-section-title" style={{ color: layer.color }}>{layer.label}</div>
                {layer.params.map(p => (
                  <div className="mc-weight-row" key={p}>
                    <span className="mc-weight-label">{paramLabels[p]}</span>
                    <input type="range" min={1} max={5} value={weights[p]}
                      onChange={e => setWeights(prev => ({ ...prev, [p]: parseInt(e.target.value) }))}
                      style={{ width: 80, height: 4, accentColor: layer.color, cursor: 'pointer' }}
                    />
                    <span className="mc-weight-val">{weights[p]}x</span>
                  </div>
                ))}
              </div>
            ))}

            {/* Unified ranking bars */}
            <div className="mc-section">
              <div className="mc-section-title">Unified Score (Cost per Useful Computation Proxy)</div>
              {ranked.map((m, i) => {
                const color = MODALITY_COLORS[m.name] || '#94a3b8';
                const pct = (m.unified / 10) * 100;
                return (
                  <div className="mc-unified-bar" key={m.name}>
                    <span className="mc-unified-label" style={{ color }}>{i + 1}. {m.name}</span>
                    <div className="mc-unified-track">
                      <div className="mc-unified-fill" style={{ width: `${pct}%`, background: color + '40' }}>
                        <span style={{ color }}>{m.unified.toFixed(2)}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {/* Legend / toggle */}
        <div className="mc-radar-legend">
          {scores.map(m => {
            const color = MODALITY_COLORS[m.name] || '#94a3b8';
            return (
              <div key={m.name} className={`mc-radar-legend-item ${hiddenMods[m.name] ? 'disabled' : ''}`} onClick={() => toggleMod(m.name)}>
                <div className="mc-radar-legend-dot" style={{ background: color }} />
                {m.name}
              </div>
            );
          })}
          <span style={{ fontSize: 9, color: '#2d3748', marginLeft: 8 }}>click to toggle</span>
        </div>
      </div>

      {/* Editable score table — grouped by layer */}
      <div className="mc-table-wrap">
        <div style={{ fontSize: 13, fontWeight: 700, color: '#f1f5f9', marginBottom: 4 }}>Parameter Scores — 3-Layer Framework</div>
        <div style={{ fontSize: 10, color: '#475569', marginBottom: 8 }}>
          Click layer tabs to switch. Drag sliders to update scores as new data emerges.
        </div>

        {/* Layer tab selector */}
        <div style={{ display: 'flex', gap: 4, marginBottom: 12 }}>
          {layers.map(layer => (
            <button key={layer.id}
              onClick={() => setExpandedLayer(layer.id)}
              style={{
                background: expandedLayer === layer.id ? layer.color + '25' : 'rgba(255,255,255,0.03)',
                border: `1px solid ${expandedLayer === layer.id ? layer.color + '60' : 'rgba(255,255,255,0.06)'}`,
                color: expandedLayer === layer.id ? layer.color : '#64748b',
                padding: '6px 14px', borderRadius: 6, cursor: 'pointer',
                fontSize: 11, fontWeight: 600, fontFamily: 'SF Mono, monospace',
                transition: 'all 0.15s',
              }}
            >{layer.label}</button>
          ))}
        </div>

        {layers.filter(l => l.id === expandedLayer).map(layer => (
          <table className="mc-table" key={layer.id}>
            <thead>
              <tr>
                <th>Modality</th>
                {layer.params.map(p => (
                  <th key={p} colSpan={2}>
                    <div className="mc-param-header">
                      <span style={{ color: layer.color }}>{paramLabels[p]}</span>
                      <span className="mc-info">{paramInfo[p]}</span>
                    </div>
                  </th>
                ))}
                <th style={{ textAlign: 'center' }}>Layer</th>
                <th style={{ textAlign: 'center' }}>Unified</th>
              </tr>
            </thead>
            <tbody>
              {scores.map((m, mi) => {
                const color = MODALITY_COLORS[m.name] || '#94a3b8';
                const unified = computeUnified(m);
                const layerScore = computeLayerScore(m, layer);
                return (
                  <tr key={m.name}>
                    <td className="mc-mod-name" style={{ color }}>{m.name}</td>
                    {layer.params.map(p => (
                      <React.Fragment key={p}>
                        <td style={{ width: 100 }}>
                          <input type="range" min={1} max={10} value={m[p].score}
                            onChange={e => updateScore(mi, p, parseInt(e.target.value))}
                          />
                          <span className="mc-raw">{m[p].raw}</span>
                        </td>
                        <td className="mc-score-cell" style={{ color: m[p].score >= 7 ? '#34d399' : m[p].score >= 4 ? '#fbbf24' : '#f87171' }}>
                          {m[p].score}
                        </td>
                      </React.Fragment>
                    ))}
                    <td className="mc-score-cell" style={{ color: layer.color, fontSize: 13 }}>
                      {layerScore.toFixed(1)}
                    </td>
                    <td className="mc-score-cell" style={{ color, fontSize: 15 }}>
                      {unified.toFixed(1)}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        ))}
      </div>

      {/* Insights */}
      <div className="mc-insight-box">
        <div className="mc-insight-label">System-Level Insights</div>
        <div className="mc-insight-text">
          {generateInsights().map((text, i) => (
            <div key={i} style={{ marginBottom: i < generateInsights().length - 1 ? 8 : 0 }} dangerouslySetInnerHTML={{ __html: '→ ' + text }} />
          ))}
        </div>
      </div>
    </div>
  );
}
